<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>シナリオ・クエストデータ - エリシア・アーカイブス</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 1段階目：章（Scene）のヘッダースタイル（文字サイズ：大） */
        .scene-header {
            background-color: #e9ecef;
            color: #333;
            padding: 14px 18px;
            font-weight: bold;
            font-size: 1.2em;
            border: 1px solid #ccc;
            margin-top: 18px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 4px;
            user-select: none;
        }
        .scene-header:hover {
            background-color: #dfe2e6;
        }
        .scene-header::after {
            content: '▼';
            font-size: 0.85em;
            transition: transform 0.2s;
        }
        .scene-header.collapsed::after {
            transform: rotate(-90deg);
        }

        /* 章の下のクエストリストを格納するコンテナ */
        .quest-list-container {
            margin-bottom: 18px;
            border: 1px solid #ccc;
            border-top: none;
            background: #fff;
            padding: 6px 0;
            display: none;
        }

        /* 2段階目：クエストタイトルのスタイル（文字サイズ：大） */
        .quest-item {
            border-bottom: 1px dashed #eee;
        }
        .quest-item:last-child {
            border-bottom: none;
        }
        .quest-title-bar {
            padding: 12px 24px;
            font-weight: bold;
            font-size: 1.1em;
            color: #222;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }
        .quest-title-bar:hover {
            background-color: #f9f9f9;
        }
        .quest-title-bar::after {
            content: '▶';
            font-size: 0.8em;
            color: #888;
            transition: transform 0.2s;
        }
        .quest-title-bar.open::after {
            transform: rotate(90deg);
        }

        /* 3段階目：詳細表示エリア（文字サイズ：大） */
        .quest-details-content {
            padding: 18px 36px;
            background-color: #faf9f6;
            border-top: 1px dashed #ddd;
            display: none;
            font-size: 1.05em;
            line-height: 1.7;
        }

        .quest-details-content ul {
            list-style-type: disc;
            margin: 0;
            padding-left: 24px;
        }
        .quest-details-content li {
            margin-bottom: 10px;
            color: #333;
        }
        .quest-details-content strong {
            color: #111;
            font-size: 1.05em;
        }

        /* 進行手順エリア用のカスタムリスト */
        .quest-steps-wrapper {
            margin-top: 6px;
            padding-left: 20px;
        }
        .step-line-item {
            margin-bottom: 6px;
            color: #444;
            list-style-type: none;
            position: relative;
        }
        .step-line-item.hint-style {
            color: #721c24;
            background-color: #f8d7da;
            padding: 4px 8px;
            border-radius: 4px;
            margin: 8px 0;
            font-size: 0.95em;
            display: inline-block;
        }

        /* 追加報酬セクションのボックススタイル */
        .extra-reward-box {
            margin-top: 12px;
            padding: 12px 18px;
            background-color: #f0f8ff;
            border-left: 4px solid #1e90ff;
            border-radius: 0 4px 4px 0;
            font-size: 1em;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <nav id="sidebar-nav"></nav>
            
            <main>
                <h2 class="page-title" style="font-size: 1.8em;">シナリオ・クエストアーカイブ</h2>
                
                <h3 class="section-category" style="font-size: 1.3em;"> 1．概要</h3>
                <div class="item-content" style="font-size: 1.05em; line-height: 1.6;">
                    データベース（Supabase）から直接読み込んだメインシナリオおよびサブクエストの一覧データです。<br>
                    追加報酬データ（名称未設定や空欄のデータ）は、自動的に直前のメインクエスト内に統合されて表示されます。
                </div>

                <h3 class="section-category" style="font-size: 1.3em;"> 2．シナリオデータ一覧</h3>
                <div class="item-content">
                    <div id="archive-tree-container">
                        <p style="text-align:center; padding:20px; font-size: 1.1em;">Supabaseからシナリオデータを読み込み中...</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="common.js"></script>

<script>
window.addEventListener('DOMContentLoaded', loadScenarioData);

async function loadScenarioData() {
    const { data: scenarioNodes, error } = await client
        .from('scenario_nodes')
        .select('*');

    if (error) {
        console.error("Supabaseデータの取得に失敗しました:", error);
        document.getElementById('archive-tree-container').innerHTML = 
            `<p style="text-align:center; color:red; font-weight:bold; padding:20px;">データの読み込みに失敗しました。</p>`;
        return;
    }

    // 数値順にソート（1, 2, 3... 8, 9, 10...）
    let rawItems = [];
    if (scenarioNodes && Array.isArray(scenarioNodes)) {
        rawItems = scenarioNodes;
        rawItems.sort((a, b) => {
            const valA = a.node_id ? parseFloat(a.node_id) : 0;
            const valB = b.node_id ? parseFloat(b.node_id) : 0;
            return valA - valB;
        });
    }

    // 【判定強化】空データや名称未設定、追加報酬データを100%直前のメインクエストにマージするロジック
    const finalizedItems = [];
    let currentMainQuest = null;

    rawItems.forEach(node => {
        const title = (node.title || '').trim();
        const steps = (node.clear_steps || '').trim();
        
        // 追加データ（おまけ行）とみなす判定基準
        const isExtra = 
            title === '' || 
            title === 'NULL' || 
            title === '名称未設定' || 
            title.includes('追加報酬') || 
            title.includes('追加') || 
            steps.includes('追加報酬');

        if (isExtra) {
            // 条件に当てはまったら、直前のメインクエストの「extra_rewards」ポケットに放り込む
            if (currentMainQuest) {
                if (!currentMainQuest.extra_rewards) {
                    currentMainQuest.extra_rewards = [];
                }
                currentMainQuest.extra_rewards.push(node);
            } else {
                // 万が一、最初にメインクエストがない場合はそのまま出す
                node.extra_rewards = [];
                finalizedItems.push(node);
            }
        } else {
            // 純粋な新規メインクエストの場合
            node.extra_rewards = [];
            finalizedItems.push(node);
            currentMainQuest = node; // 以降の追加データはこのクエストにドッキングさせる
        }
    });

    // 章（scene）ごとにグループ分け
    const groupedData = {};
    finalizedItems.forEach(node => {
        const sceneName = (node.scene && node.scene !== 'NULL' && node.scene !== '') ? node.scene : 'その他のクエスト';
        if (!groupedData[sceneName]) {
            groupedData[sceneName] = [];
        }
        groupedData[sceneName].push(node);
    });

    renderTreeArchive(groupedData);
}

// 経験値用カンマ区切りフォーマット
function formatExp(expValue) {
    if (!expValue || expValue === 'NULL' || expValue === '0' || expValue === '') return null;
    const num = Math.floor(Number(String(expValue).replace(/,/g, '')));
    return isNaN(num) ? expValue : num.toLocaleString();
}

function renderTreeArchive(groupedData) {
    const container = document.getElementById('archive-tree-container');
    if (!container) return;

    const sceneNames = Object.keys(groupedData);
    if (sceneNames.length === 0) {
        container.innerHTML = `<p style="text-align:center; padding:20px;">該当するシナリオデータがありません。</p>`;
        return;
    }

    let html = '';
    let sceneIndex = 0;

    sceneNames.forEach(sceneName => {
        sceneIndex++;
        const nodes = groupedData[sceneName];

        html += `
            <div class="scene-header collapsed" data-target="box-${sceneIndex}">
                ${sceneName} （全 ${nodes.length} 件）
            </div>
            <div id="box-${sceneIndex}" class="quest-list-container">
        `;

        nodes.forEach(node => {
            const displayId = node.node_id ? Math.floor(Number(node.node_id)) : '-';
            const titleText = node.title || '名称未設定';
            
            let displayLevel = node.必要レベル;
            if (displayLevel && displayLevel !== 'NULL' && displayLevel !== '') {
                const parsedLvl = Number(displayLevel);
                if (!isNaN(parsedLvl)) displayLevel = Math.floor(parsedLvl);
            }
            const lvlText = displayLevel ? ` [必要Lv: ${displayLevel}]` : '';

            // 報酬テキストの組み立て
            const formattedBase = formatExp(node.BaseExp);
            const formattedJob = formatExp(node.JobExp);
            let expParts = [];
            if (formattedBase) expParts.push(`BaseExp ${formattedBase}`);
            if (formattedJob) expParts.push(`JobExp ${formattedJob}`);
            const rewardExpText = expParts.length > 0 ? expParts.join(' / ') : 'なし';
            const itemReward = (node.報酬 && node.報酬 !== 'NULL' && node.報酬 !== '') ? node.報酬 : '';
            const finalRewardText = itemReward ? `${rewardExpText} 、${itemReward}` : rewardExpText;

            const objectiveText = (node.content_text && node.content_text !== 'NULL' && node.content_text !== '') ? node.content_text : '-';

            // 進行手順の組み立て（依頼人抽出）
            let clientText = '-';
            let stepsHtml = '';
            const rawSteps = node.clear_steps;

            if (rawSteps && rawSteps !== 'NULL' && rawSteps !== '') {
                const stepLines = String(rawSteps).split(/\n|<br>|\\n/).map(s => s.trim()).filter(Boolean);
                if (stepLines.length > 0) {
                    if (stepLines[0] && !/^\d+[\.\、\s\-：:]/.test(stepLines[0])) {
                        clientText = stepLines[0];
                        stepLines.shift();
                    }

                    stepsHtml = '<div class="quest-steps-wrapper">';
                    stepLines.forEach(line => {
                        let currentLine = line;
                        let isHint = false;

                        if (currentLine.startsWith('ヒント：') || currentLine.startsWith('ヒント:')) {
                            isHint = true;
                        }

                        if (!isHint) {
                            stepsHtml += `<div class="step-line-item">${currentLine}</div>`;
                        } else {
                            stepsHtml += `<div class="step-line-item hint-style">${currentLine}</div>`;
                        }
                    });
                    stepsHtml += '</div>';
                }
            }

            if (stepsHtml === '') {
                stepsHtml = '<div class="quest-steps-wrapper">-</div>';
            }

            // 合体させた追加報酬（extra_rewards）の表示用HTML組み立て
            let extraRewardsHtml = '';
            if (node.extra_rewards && node.extra_rewards.length > 0) {
                node.extra_rewards.forEach(extra => {
                    const exBase = formatExp(extra.BaseExp);
                    const exJob = formatExp(extra.JobExp);
                    let exExpParts = [];
                    if (exBase) exExpParts.push(`BaseExp ${exBase}`);
                    if (exJob) exExpParts.push(`JobExp ${exJob}`);
                    const exExpText = exExpParts.length > 0 ? exExpParts.join(' / ') : 'なし';
                    const exItem = (extra.報酬 && extra.報酬 !== 'NULL' && extra.報酬 !== '') ? extra.報酬 : '';
                    const exFinalReward = exItem ? `${exExpText} 、${exItem}` : exExpText;
                    
                    // 追加側の手順や目的を条件として表示する
                    let condition = (extra.clear_steps && extra.clear_steps !== 'NULL' && extra.clear_steps !== '') ? extra.clear_steps : '';
                    if (!condition) {
                        condition = (extra.title && extra.title !== '名称未設定') ? extra.title : '追加報酬条件';
                    }

                    extraRewardsHtml += `
                        <div class="extra-reward-box">
                            <strong>🎁 追加内容:</strong> ${condition}<br>
                            <span style="color: #444; margin-left: 10px;">➔ 獲得報酬: <strong>${exFinalReward}</strong></span>
                        </div>
                    `;
                });
            }

            // クエストブロック
            html += `
                <div class="quest-item">
                    <div class="quest-title-bar" data-target="details-${displayId}">
                        <span>${displayId}. ${titleText}<span style="font-size:0.85em; color:#1e90ff; font-weight:normal;">${lvlText}</span></span>
                    </div>
                    
                    <div id="details-${displayId}" class="quest-details-content">
                        <ul>
                            <li><strong>目的:</strong> ${objectiveText}</li>
                            <li><strong>依頼人:</strong> <span style="color:#b22222; font-weight:bold;">${clientText}</span></li>
                            <li><strong>報酬:</strong> ${finalRewardText}</li>
                            <li><strong>進行手順:</strong>
                                ${stepsHtml}
                            </li>
                        </ul>
                        ${extraRewardsHtml}
                    </div>
                </div>
            `;
        });

        html += `</div>`;
    });

    container.innerHTML = html;
    setupTwoLevelAccordion();
}

function setupTwoLevelAccordion() {
    document.querySelectorAll('.scene-header').forEach(header => {
        header.addEventListener('click', () => {
            const targetId = header.getAttribute('data-target');
            const targetBox = document.getElementById(targetId);
            if (targetBox) {
                const isHidden = window.getComputedStyle(targetBox).display === 'none';
                targetBox.style.display = isHidden ? 'block' : 'none';
                header.classList.toggle('collapsed', !isHidden);
            }
        });
    });

    document.querySelectorAll('.quest-title-bar').forEach(titleBar => {
        titleBar.addEventListener('click', () => {
            const targetId = titleBar.getAttribute('data-target');
            const detailsBox = document.getElementById(targetId);
            if (detailsBox) {
                const isHidden = window.getComputedStyle(detailsBox).display === 'none';
                detailsBox.style.display = isHidden ? 'block' : 'none';
                titleBar.classList.toggle('open', isHidden);
            }
        });
    });
}
</script>
</body>
</html>
