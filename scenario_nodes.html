<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>シナリオ・クエストデータ - エリシア・アーカイブス</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <nav id="sidebar-nav"></nav>
            
            <main>
                <h2 class="page-title">シナリオ・クエストアーカイブ</h2>
                
                <h3 class="section-category"> 1．概要</h3>
                <div class="item-content">
                    データベース（Supabase）から直接読み込んだメインシナリオおよびサブクエストの一覧データです。<br>
                    受注に必要なレベル、各クエストの進行手順、各種ドロップアイテムやクリア報酬データを網羅しています。
                </div>

                <h3 class="section-category"> 2．シナリオデータ一覧</h3>
                <div class="item-content">
                    
                    <div id="scenario-controls" style="margin-bottom: 15px; padding: 10px; background: #fdfdfd; border: 1px solid #ddd; border-radius: 5px; font-size: 0.85em;">
                        <strong style="margin-right:15px;">表示列の切り替え:</strong>
                        <label style="margin-right:10px; cursor:pointer;"><input type="checkbox" class="toggle-col" data-target="cls-scene" checked> 章・セクション</label>
                        <label style="margin-right:10px; cursor:pointer;"><input type="checkbox" class="toggle-col" data-target="cls-content" checked> 概要・あらすじ</label>
                        <label style="margin-right:10px; cursor:pointer;"><input type="checkbox" class="toggle-col" data-target="cls-steps" checked> 進行手順(クリア条件)</label>
                        <label style="margin-right:10px; cursor:pointer;"><input type="checkbox" class="toggle-col" data-target="cls-drops" checked> 特殊ドロップ</label>
                        <label style="margin-right:10px; cursor:pointer;"><input type="checkbox" class="toggle-col" data-target="cls-exp" checked> 獲得経験値</label>
                        <label style="margin-right:10px; cursor:pointer;"><input type="checkbox" class="toggle-col" data-target="cls-reward" checked> クリア報酬</label>
                    </div>

                    <table id="scenario-table">
                        <thead>
                            <tr>
                                <th style="width: 5%;">ID</th>
                                <th class="cls-scene" style="width: 15%;">章 / シーン</th>
                                <th style="width: 15%;">タイトル / 必要Lv</th>
                                <th class="cls-content" style="width: 20%;">概要</th>
                                <th class="cls-steps" style="width: 25%;">進行手順</th>
                                <th class="cls-drops" style="width: 10%;">ドロップ項目</th>
                                <th class="cls-exp" style="width: 10%;">獲得EXP</th>
                                <th class="cls-reward" style="width: 10%;">報酬</th>
                            </tr>
                        </thead>
                        <tbody id="scenario-body">
                            <tr>
                                <td colspan="8" style="text-align:center;">Supabaseからシナリオデータを読み込み中...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <script src="common.js"></script>

<script>
// ドキュメントの読み込み完了時に実行
window.addEventListener('DOMContentLoaded', loadScenarioData);

async function loadScenarioData() {
    // 1. Supabaseの 'scenario_nodes' テーブルから全データを一括取得
    const { data: scenarioNodes, error } = await client
        .from('scenario_nodes')
        .select('*');

    if (error) {
        console.error("Supabaseデータの取得に失敗しました:", error);
        const tbody = document.getElementById('scenario-body');
        if (tbody) {
            tbody.innerHTML = `<tr><td colspan="8" style="text-align:center; color:red; font-weight:bold;">データの読み込みに失敗しました。詳細: ${error.message}</td></tr>`;
        }
        return;
    }

    // 文字列の "1.0" や "10.0" から小数点を綺麗に除去し、純粋な数値として1から順に並び替える
    if (scenarioNodes) {
        scenarioNodes.sort((a, b) => {
            const numA = a.node_id ? Math.floor(Number(a.node_id)) : 0;
            const numB = b.node_id ? Math.floor(Number(b.node_id)) : 0;
            return numA - numB;
        });
    }

    // 2. テーブルへのレンダリング処理
    renderScenarioTable(scenarioNodes);
}

// 数値をカンマ区切りテキストに変換するヘルパー関数
function formatExp(expValue) {
    if (!expValue || expValue === 'NULL' || expValue === '0' || expValue === '') {
        return null;
    }
    // 小数点対策として、一度数値化して端数を切り捨てる
    const num = Math.floor(Number(String(expValue).replace(/,/g, '')));
    return isNaN(num) ? expValue : num.toLocaleString();
}

function renderScenarioTable(nodes) {
    const tbody = document.getElementById('scenario-body');
    if (!tbody) return;

    if (!nodes || nodes.length === 0) {
        tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;">該当するシナリオデータがありません。</td></tr>`;
        return;
    }

    // マッピング処理
    tbody.innerHTML = nodes.map(node => {
        
        // "必要レベル" の1.0などを整数表記にする処理
        let displayLevel = node.必要レベル;
        if (displayLevel && displayLevel !== 'NULL' && displayLevel !== '') {
            const parsedLvl = Number(displayLevel);
            if (!isNaN(parsedLvl)) {
                displayLevel = Math.floor(parsedLvl);
            }
        }
        const reqLevelHtml = (displayLevel) ? 
            `<div style="font-size: 0.8em; color: #1e90ff; font-weight: bold; margin-top: 4px;">[必要Lv: ${displayLevel}]</div>` : '';

        // 特殊ドロップ（required_item, Drop2, Drop3, Drop4）の結合処理
        let drops = [];
        if (node.required_item && node.required_item !== 'NULL' && node.required_item !== '') drops.push(node.required_item);
        if (node.Drop2 && node.Drop2 !== 'NULL' && node.Drop2 !== '') drops.push(node.Drop2);
        if (node.Drop3 && node.Drop3 !== 'NULL' && node.Drop3 !== '') drops.push(node.Drop3);
        if (node.Drop4 && node.Drop4 !== 'NULL' && node.Drop4 !== '') drops.push(node.Drop4);
        const dropsHtml = drops.length > 0 ? drops.join('<br>') : '<span style="color:#999;">-</span>';

        // 獲得EXP（Base / Job）のパースとカンマ区切り整形
        const formattedBase = formatExp(node.BaseExp);
        const formattedJob = formatExp(node.JobExp);
        
        const baseExpText = formattedBase ? `Base: ${formattedBase}` : '';
        const jobExpText = formattedJob ? `Job: ${formattedJob}` : '';
        const expHtml = [baseExpText, jobExpText].filter(Boolean).join('<br>') || '<span style="color:#999;">0</span>';

        // クリア報酬
        const rewardText = (node.報酬 && node.報酬 !== 'NULL' && node.報酬 !== '') ? node.報酬 : '<span style="color:#999;">-</span>';

        // 概要や手順が空っぽ（NULL）の時のフォールバック
        const contentText = (node.content_text && node.content_text !== 'NULL') ? node.content_text : '-';
        const clearSteps = (node.clear_steps && node.clear_steps !== 'NULL') ? node.clear_steps : '-';

        // 小数点（1.0など）が表示されるのを完全に防ぐため、整数値にキャスト
        const displayId = node.node_id ? Math.floor(Number(node.node_id)) : '-';

        return `
            <tr>
                <td style="text-align:center; font-family: monospace; font-weight: bold;">${displayId}</td>
                <td class="cls-scene" style="font-size: 0.9em; color: #555;">${node.scene || '-'}</td>
                <td style="font-weight: bold; color: #222;">
                    ${node.title || '名称未設定'}
                    ${reqLevelHtml}
                </td>
                <td class="cls-content" style="font-size: 0.88em; color: #444; line-height: 1.4;">${contentText}</td>
                <td class="cls-steps" style="font-size: 0.88em; line-height: 1.4;">${clearSteps}</td>
                <td class="cls-drops" style="font-size: 0.85em; color: #333;">${dropsHtml}</td>
                <td class="cls-exp" style="font-size: 0.85em; text-align: right; font-family: monospace; line-height: 1.3;">${expHtml}</td>
                <td class="cls-reward" style="font-size: 0.85em; color: #d02090; font-weight: bold;">${rewardText}</td>
            </tr>
        `;
    }).join('');

    // 表示列の動的切り替えイベント設定
    setupColumnToggles();
}

function setupColumnToggles() {
    document.querySelectorAll('.toggle-col').forEach(checkbox => {
        const targetClass = checkbox.getAttribute('data-target');
        const elements = document.getElementsByClassName(targetClass);
        for (let el of elements) {
            el.style.display = checkbox.checked ? '' : 'none';
        }

        checkbox.addEventListener('change', (e) => {
            const target = e.target.getAttribute('data-target');
            const els = document.getElementsByClassName(target);
            for (let el of els) {
                el.style.display = e.target.checked ? '' : 'none';
            }
        });
    });
}
</script>
</body>
</html>
