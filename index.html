<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>エリシア・アーカイブス (Ellicia Archives)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* --- 全体レイアウト --- */
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            font-family: "Helvetica Neue", "Arial", "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", sans-serif;
            color: #5d4037;
            background-color: #f4eade;
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            width: 80%; /* 左右1割の余白 */
            margin: 0 auto;
            background-color: #fffaf0;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            height: 100vh;
        }

        /* ① ヘッダー：バナー調整 */
        header {
            background-color: #fff;
            border-bottom: 2px solid #d2b48c;
            overflow: hidden;
        }
        .header-banner {
            width: 100%;
            height: 120px; /* 縦幅をスリムに */
            display: block;
            object-fit: cover;
            object-position: center;
        }
        .nav-bar {
            background-color: #8b5a5a;
            height: 8px;
            width: 100%;
        }

        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ② 左側：サイドバー */
        nav {
            width: 180px;
            background-color: #fffaf0;
            border-right: 1px solid #e0d0c0;
            padding: 10px;
            overflow-y: auto;
            font-size: 11px;
        }
        nav h3 {
            background-color: #f5e1e1;
            border-left: 4px solid #8b5a5a;
            padding: 3px 8px;
            font-size: 12px;
            margin: 12px 0 4px 0;
            color: #8b5a5a;
        }
        nav ul { list-style: none; padding: 0; margin: 0; }
        nav li { margin: 2px 0; }
        nav a {
            text-decoration: none;
            color: #5d4037;
            display: block;
            cursor: pointer;
            padding: 2px;
        }
        nav a:before { content: "┣"; margin-right: 4px; color: #d2b48c; }
        nav li:last-child a:before { content: "┗"; }
        nav a:hover { background-color: #f5e1e1; color: #8b5a5a; }

        /* ③ 右側：メインコンテンツ（ここが切り替わる） */
        main {
            flex: 1;
            padding: 15px 25px;
            overflow-y: auto;
            background-color: #fff;
            font-size: 13px;
        }
        h2.page-title {
            color: #8b5a5a;
            font-size: 18px;
            border-bottom: 2px solid #f5e1e1;
            margin: 0 0 10px 0;
            padding-bottom: 5px;
        }

        /* --- 生産データ表示用スタイル --- */
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        th { background: #f5e1e1; border: 1px solid #e0d0c0; padding: 6px; text-align: left; color: #8b5a5a; }
        td { border: 1px solid #e0d0c0; padding: 4px; vertical-align: middle; }
        
        /* ジョブ行（金色の帯） */
        .row-job { background: #d2b48c; color: #fff; font-weight: bold; cursor: pointer; }
        /* スキル行（ピンクの帯） */
        .row-skill { background: #fdf2f4; font-weight: bold; cursor: pointer; color: #8b5a5a; }
        
        .tree-line { font-family: "MS Gothic", monospace; color: #d2b48c; letter-spacing: -1px; margin-right: 5px; }
        
        /* チェックボックスの装飾 */
        input[type="checkbox"] { transform: scale(0.9); cursor: pointer; }
        
        .history-box {
            background-color: #fdf5f5;
            border: 1px solid #f5e1e1;
            padding: 8px 12px;
            font-size: 11px;
            color: #7d5a5a;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <img src="input_file_0.jpg" alt="Banner" class="header-banner">
            <div class="nav-bar"></div>
        </header>

        <div class="container">
            <nav id="sidebar-nav">
                <!-- ここは将来的にテーブル管理も可能 -->
                <h3>■はじめに</h3>
                <ul>
                    <li><a onclick="showPage('front-page')">FrontPage</a></li>
                    <li><a>よくある質問(FAQ)</a></li>
                </ul>
                <h3>■生産</h3>
                <ul>
                    <li><a onclick="showPage('production-page')">生産データ一覧</a></li>
                </ul>
            </nav>

            <main>
                <!-- FrontPageエリア -->
                <div id="front-page">
                    <h2 class="page-title">FrontPage</h2>
                    <p>『エリシアオンライン』の歴史と技術を記したアーカイブスへようこそ。</p>
                    <div style="background-color: #8b5a5a; color: #fff; padding: 3px 10px; font-weight: bold; font-size: 11px; margin: 15px 0 8px 0;">更新履歴</div>
                    <div class="history-box">
                        ・2026/05/02：サイドバーから「生産データ一覧」を呼び出せるように統合
                    </div>
                </div>

                <!-- 生産データ表示エリア -->
                <div id="production-page" class="hidden">
                    <h2 class="page-title">エリシア生産データ一覧（Pink Ver.）</h2>
                    <table>
                        <thead>
                            <tr>
                                <th style="width: 30px;">済</th>
                                <th>生産レシピ・ツリー</th>
                            </tr>
                        </thead>
                        <tbody id="recipe-body">
                            <tr><td colspan="2">記録を照合中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <script>
        const S_URL = 'https://djfklvgrpdehqzhhodyg.supabase.co'; 
        const S_KEY = 'sb_publishable_ywFWyEJawcabWW8nHoETtQ_l-JyNOfC';
        const client = supabase.createClient(S_URL, S_KEY);

        // ページ切り替え
        function showPage(pageId) {
            document.getElementById('front-page').classList.add('hidden');
            document.getElementById('production-page').classList.add('hidden');
            
            document.getElementById(pageId).classList.remove('hidden');
            
            if(pageId === 'production-page') {
                loadAllRecipes();
            }
        }

        // 生産データの動的生成（以前の「Pink Ver.」ロジックを統合）
        async function loadAllRecipes() {
            const tbody = document.getElementById('recipe-body');
            try {
                const [rRes, jRes] = await Promise.all([
                    client.from('recipes').select('*').order('skill_type').order('skill_lv'),
                    client.from('job_masters').select('*').order('id')
                ]);
                
                const recipes = rRes.data || [];
                const jobsData = jRes.data || [];
                let html = '';

                jobsData.forEach((job, jIdx) => {
                    const jobRecipes = recipes.filter(r => r.required_jobs === job.short_name);
                    if (jobRecipes.length === 0) return;

                    const jobId = `j-${jIdx}`;
                    // ジョブ行
                    html += `
                        <tr class="row-job" onclick="toggleLayer('${jobId}', 'btn-${jobId}')">
                            <td style="text-align:center;"><input type="checkbox" onclick="event.stopPropagation()"></td>
                            <td><span id="btn-${jobId}">▶</span> ${job.full_name}</td>
                        </tr>`;

                    // スキル種別でまとめる
                    const groups = {};
                    jobRecipes.forEach(r => {
                        const k = `${r.skill_type}_${r.skill_lv}`;
                        if(!groups[k]) groups[k] = [];
                        groups[k].push(r);
                    });

                    Object.keys(groups).forEach((groupKey, sIdx) => {
                        const sId = `${jobId}-s-${sIdx}`;
                        const [type, lv] = groupKey.split('_');
                        
                        // スキル行
                        html += `
                            <tr class="row-skill hidden" data-id="${sId}" data-parent="${jobId}" onclick="toggleLayer('${sId}', 'btn-${sId}')">
                                <td style="text-align:center;"><input type="checkbox" onclick="event.stopPropagation()"></td>
                                <td><span class="tree-line">┗ </span><span id="btn-${sId}">▶</span> ${type} (Lv${lv})</td>
                            </tr>`;

                        // レシピ行
                        groups[groupKey].forEach(r => {
                            html += `
                                <tr class="hidden" data-parent="${sId}">
                                    <td style="text-align:center;"><input type="checkbox"></td>
                                    <td><span class="tree-line">  ┣ </span> 【${r.recipe_name}】 → ${r.output_item_name}</td>
                                </tr>`;
                        });
                    });
                });
                tbody.innerHTML = html;
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="2">データ取得エラー</td></tr>';
            }
        }

        // ツリーの開閉ロジック
        function toggleLayer(id, btnId) {
            const btn = document.getElementById(btnId);
            const isExpanding = btn.textContent === '▶';
            
            document.querySelectorAll(`tr[data-parent]`).forEach(el => {
                const parents = el.getAttribute('data-parent').split(' ');
                if (parents[parents.length - 1] === id) {
                    if (isExpanding) el.classList.remove('hidden');
                    else {
                        recursiveHide(el.getAttribute('data-id'));
                        el.classList.add('hidden');
                    }
                }
            });
            btn.textContent = isExpanding ? '▼' : '▶';
        }

        function recursiveHide(parentId) {
            if (!parentId) return;
            document.querySelectorAll(`tr[data-parent*="${parentId}"]`).forEach(child => {
                child.classList.add('hidden');
                const btn = document.getElementById(`btn-${child.getAttribute('data-id')}`);
                if (btn) btn.textContent = '▶';
                recursiveHide(child.getAttribute('data-id'));
            });
        }
    </script>
</body>
</html>
