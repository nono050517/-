<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>エリシア・アーカイブス (Ellicia Archives)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* --- 1. 全体レイアウト --- */
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            font-family: "Helvetica Neue", "Arial", "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", sans-serif;
            color: #5d4037;
            background-color: #f4eade;
            font-size: 10px;
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            width: 80%;
            margin: 0 auto;
            background-color: #fffaf0;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            height: 100vh;
        }

        header {
            background-color: #fff;
            border-bottom: 2px solid #d2b48c;
            padding: 15px 30px;
        }
        .header-title {
            margin: 0;
            color: #8b5a5a;
            font-size: 18px;
            letter-spacing: 1px;
        }
        .header-subtitle {
            margin: 2px 0 0 0;
            color: #a08080;
            font-size: 10px;
            font-weight: normal;
        }
        .nav-bar {
            background-color: #8b5a5a;
            height: 8px;
            width: 100%;
        }

        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* --- 2. サイドバー --- */
        nav {
            width: 160px;
            background-color: #fffaf0;
            border-right: 1px solid #e0d0c0;
            padding: 10px;
            overflow-y: auto;
            font-size: 9px;
        }
        nav h3 {
            background-color: #f5e1e1;
            border-left: 4px solid #8b5a5a;
            padding: 3px 8px;
            font-size: 10px;
            margin: 12px 0 4px 0;
            color: #8b5a5a;
        }
        nav ul { list-style: none; padding: 0; margin: 0; }
        nav li { margin: 2px 0; }
        nav a {
            text-decoration: none;
            color: #5d4037;
            display: block;
            cursor: pointer;
            padding: 2px;
        }
        nav a:before { content: "┣"; margin-right: 4px; color: #d2b48c; }
        nav li:last-child a:before { content: "┗"; }
        nav a:hover { background-color: #f5e1e1; color: #8b5a5a; }

        /* --- 3. メインコンテンツ --- */
        main {
            flex: 1;
            padding: 15px 35px;
            overflow-y: auto;
            background-color: #fff;
            font-size: 11px;
        }
        h2.page-title {
            color: #8b5a5a;
            font-size: 16px;
            border-bottom: 2px solid #f5e1e1;
            margin: 0 0 20px 0;
            padding-bottom: 8px;
        }

        /* コントロールエリア（リセットボタン） */
        .control-area {
            margin-bottom: 10px;
            text-align: right;
        }
        .btn-reset {
            background-color: #8b5a5a;
            color: #fff;
            border: none;
            padding: 4px 10px;
            font-size: 9px;
            border-radius: 3px;
            cursor: pointer;
        }
        .btn-reset:hover { background-color: #a04040; }

        .fp-section { margin-bottom: 30px; }
        .fp-section h3 {
            border-left: 4px solid #8b5a5a;
            padding-left: 12px;
            font-size: 12px;
            color: #8b5a5a;
            margin: 25px 0 10px 0;
        }

        .hidden { display: none !important; }

        /* --- 4. 生産テーブル --- */
        table { width: 100%; border-collapse: collapse; line-height: 1.3; background-color: #fff; }
        th { border: 1px solid #ffb6c1; padding: 4px; text-align: left; background: #ffc0cb; color: #000; font-weight: bold; position: sticky; top: 0; z-index: 10; font-size: 10px; }
        td { border: 1px solid #ffdae0; padding: 2px 4px; color: #000; font-size: 9px; }
        .row-job { background: #ffb6c1; color: #fff !important; font-weight: bold; cursor: pointer; height: 22px; }
        .row-skill { background: #fff0f5; color: #000; font-weight: bold; cursor: pointer; }
        .row-recipe { color: #000; font-weight: bold; cursor: pointer; }
        .row-output { font-weight: bold; background: #fffafb; }
        .tree-line { font-family: "MS Gothic", monospace; white-space: pre; color: #ffc0cb; font-size: 10px; }
        .toggle-icon { display: inline-block; width: 12px; text-align: center; margin-right: 5px; color: #d02090; }
        .method-label { display: inline-block; font-size: 8px; padding: 0px 2px; margin-left: 4px; border-radius: 3px; cursor: pointer; border: 1px solid #ccc; background: #fff; }
        .source-container { font-size: 8px; background: #fffafa; border: 1px solid #ffb6c1; padding: 3px 6px; margin: 2px 0 4px 20px; border-radius: 4px; color: #000; }
        .cb { vertical-align: middle; margin: 0 3px; cursor: pointer; accent-color: #e91e63; transform: scale(0.8); }
    </style>
</head>
<body onload="initApp()">

    <div class="wrapper">
        <header>
            <h1 class="header-title">エリシアオンライン　アーカイブス</h1>
            <h2 class="header-subtitle">Ellicia-Online Archives</h2>
        </header>
        <div class="nav-bar"></div>

        <div class="container">
            <nav id="sidebar-nav">
                <div style="padding:10px; font-size:8px;">読み込み中...</div>
            </nav>

            <main id="main-scroll">
                <!-- 1. FrontPage -->
                <div id="front-page">
                    <h2 class="page-title">FrontPage</h2>
                    <div class="fp-section">
                        <h3>1. 概要</h3>
                        <p>このサイトは、MMORPG『エリシアオンライン』の個人運営非公式データベースです。</p>
                        <!-- (中略) -->
                    </div>
                </div>

                <!-- 3. 生産ページ -->
                <div id="production-page" class="hidden">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <h2 class="page-title" style="border:none; margin:0;">エリシア生産データ一覧</h2>
                        <div class="control-area">
                            <button class="btn-reset" onclick="resetAllChecks()">チェックをクリア</button>
                        </div>
                    </div>
                    <table>
                        <thead><tr><th>🌸 生産レシピ・チェックリスト 🌸</th></tr></thead>
                        <tbody id="recipe-body"><tr><td>データ読み込み中...</td></tr></tbody>
                    </table>
                </div>

                <!-- その他のページ... -->
                <div id="faq-page" class="hidden">...</div>
                <div id="coming-soon" class="hidden">...</div>
            </main>
        </div>
    </div>

    <script>
        const S_URL = 'https://djfklvgrpdehqzhhodyg.supabase.co'; 
        const S_KEY = 'sb_publishable_ywFWyEJawcabWW8nHoETtQ_l-JyNOfC';
        const client = supabase.createClient(S_URL, S_KEY);

        async function initApp() { 
            await loadSideMenu();
            showPage('front-page'); 
        }

        async function loadSideMenu() {
            const nav = document.getElementById('sidebar-nav');
            try {
                const { data, error } = await client.from('nav_menus').select('*').eq('is_active', true).order('display_order', { ascending: true });
                if (error) throw error;
                let navHtml = ''; let currentCategory = '';
                data.forEach(item => {
                    if (item.category !== currentCategory) {
                        if (currentCategory !== '') navHtml += '</ul>';
                        navHtml += `<h3>${item.category}</h3><ul>`;
                        currentCategory = item.category;
                    }
                    const clickAction = item.page_id ? `showPage('${item.page_id}')` : `showPage('coming-soon')`;
                    navHtml += `<li><a onclick="${clickAction}">${item.display_name}</a></li>`;
                });
                nav.innerHTML = navHtml + '</ul>';
            } catch (e) { nav.innerHTML = 'メニュー読込失敗'; }
        }

        function showPage(pageId) {
            const sections = ['front-page', 'faq-page', 'production-page', 'coming-soon'];
            sections.forEach(id => document.getElementById(id)?.classList.add('hidden'));
            document.getElementById(pageId)?.classList.remove('hidden');
            if(pageId === 'production-page') loadAllRecipes();
        }

        // --- 生産レシピ描画 + 進捗管理機能 ---
        async function loadAllRecipes() {
            const tbody = document.getElementById('recipe-body');
            if (tbody.getAttribute('data-loaded') === 'true') {
                loadCheckStatus(); // 既にロード済みならチェック状態だけ更新
                return;
            }
            try {
                const [rRes, iRes, jRes] = await Promise.all([
                    client.from('recipes').select('*').order('skill_type').order('skill_lv'),
                    client.from('items').select('*'),
                    client.from('job_masters').select('*')
                ]);
                const recipes = rRes.data || [];
                const itemsData = iRes.data || [];
                const jobsData = jRes.data || [];

                const getMethods = (itemName, pId, idx) => {
                    const matches = itemsData.filter(item => item.name === itemName);
                    const baseId = `src-${pId}-${idx}`.replace(/[\s-]/g, '_');
                    let labels = '', details = '';
                    matches.forEach(m => {
                        const id = `${baseId}-${m.method}`;
                        labels += `<span class="method-label" onclick="event.stopPropagation(); toggleDetail('${id}')">${m.method}</span>`;
                        details += `<div id="${id}" class="source-container" style="display:none;">●${m.location} (${m.target})</div>`;
                    });
                    return { labels, details };
                };

                const renderMaterials = (recipe, pId) => {
                    let rows = '';
                    const mats = [];
                    for(let i=1; i<=4; i++) if(recipe[`material_${i}`] && recipe[`material_${i}`]!=='NULL') mats.push({n: recipe[`material_${i}`], q: recipe[`amount_${i}`]});
                    mats.forEach((m, idx) => {
                        const isLast = (idx === mats.length - 1);
                        // チェックボックスに一意のID（レシピ名+素材名）を付与
                        const cbId = `cb-${recipe.output_item_name}-${m.n}`.replace(/\s+/g, '_');
                        const {labels, details} = getMethods(m.n, pId, idx);
                        rows += `<tr class="row-sub hidden" data-parent="${pId}"><td><span class="tree-line">│   ${isLast?'┗':'┣'} </span><input type="checkbox" class="cb" id="${cbId}" onchange="saveCheckStatus()"><span>${m.n}</span>(×${m.q})${labels}${details}</td></tr>`;
                    });
                    return rows;
                };

                let html = '';
                jobsData.forEach((job, jIdx) => {
                    const jobRecipes = recipes.filter(r => r.required_jobs === job.short_name);
                    if (!jobRecipes.length) return;
                    const jobId = `job-${jIdx}`;
                    html += `<tr class="row-job" id="${jobId}" data-id="${jobId}" onclick="toggleLayer('${jobId}', 'btn-${jobId}')"><td><span class="toggle-icon" id="btn-${jobId}" style="color:#fff">▶</span>${job.full_name}</td></tr>`;
                    
                    const groups = {};
                    jobRecipes.forEach(r => { const k = `${r.skill_type}_${r.skill_lv}`; if(!groups[k]) groups[k]=[]; groups[k].push(r); });
                    Object.keys(groups).forEach((gk, sIdx) => {
                        const sId = `${jobId}-s-${sIdx}`, [type, lv] = gk.split('_');
                        html += `<tr class="row-skill hidden" data-id="${sId}" data-parent="${jobId}" onclick="toggleLayer('${sId}', 'btn-${sId}')"><td><span class="tree-line">┗ </span><span class="toggle-icon" id="btn-${sId}">▶</span>${type} (Lv${lv})</td></tr>`;
                        groups[gk].forEach((r, rIdx) => {
                            const rId = `${sId}-r-${rIdx}`;
                            const outputCbId = `cb-out-${r.output_item_name}`.replace(/\s+/g, '_');
                            html += `<tr class="row-output hidden" data-id="${rId}" data-parent="${sId}" onclick="toggleLayer('${rId}', 'btn-${rId}')"><td><span class="tree-line">   ┗ </span><span class="toggle-icon" id="btn-${rId}">▶</span><input type="checkbox" class="cb" id="${outputCbId}" onchange="saveCheckStatus()"><b>${r.output_item_name}</b></td></tr>`;
                            html += renderMaterials(r, rId);
                        });
                    });
                });
                tbody.innerHTML = html;
                tbody.setAttribute('data-loaded', 'true');
                loadCheckStatus(); // 描画後に保存データを反映
            } catch (e) { tbody.innerHTML = `<tr><td>読込失敗</td></tr>`; }
        }

        // --- 保存・復元系 ---
        function saveCheckStatus() {
            const checkStates = {};
            document.querySelectorAll('.cb').forEach(cb => { if(cb.id) checkStates[cb.id] = cb.checked; });
            localStorage.setItem('ellicia_recipe_progress', JSON.stringify(checkStates));
        }

        function loadCheckStatus() {
            const saved = localStorage.getItem('ellicia_recipe_progress');
            if (!saved) return;
            const states = JSON.parse(saved);
            Object.keys(states).forEach(id => {
                const cb = document.getElementById(id);
                if (cb) cb.checked = states[id];
            });
        }

        function resetAllChecks() {
            if (confirm('すべてのチェックをリセットしますか？')) {
                document.querySelectorAll('.cb').forEach(cb => cb.checked = false);
                localStorage.removeItem('ellicia_recipe_progress');
            }
        }

        function toggleLayer(id, btnId) {
            const btn = document.getElementById(btnId);
            const isExpanding = btn.textContent === '▶';
            document.querySelectorAll(`tr[data-parent="${id}"]`).forEach(el => {
                if (isExpanding) el.classList.remove('hidden');
                else { recursiveHide(el.getAttribute('data-id')); el.classList.add('hidden'); }
            });
            btn.textContent = isExpanding ? '▼' : '▶';
        }

        function recursiveHide(parentId) {
            if (!parentId) return;
            document.querySelectorAll(`tr[data-parent="${parentId}"]`).forEach(child => {
                child.classList.add('hidden');
                const btn = document.getElementById(`btn-${child.getAttribute('data-id')}`);
                if (btn) btn.textContent = '▶';
                recursiveHide(child.getAttribute('data-id'));
            });
        }

        function toggleDetail(id) {
            const el = document.getElementById(id);
            if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
        }
    </script>
</body>
</html>
