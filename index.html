<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ellicia Archives - Recipe DB</title>
    <style>
        /* 和田さんの既存スタイルを継承 */
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; display: flex; }
        nav { width: 200px; background: #333; color: #fff; height: 100vh; padding: 10px; font-size: 11px; overflow-y: auto; }
        main { flex: 1; padding: 20px; background: #fff; }
        .header-subtitle { font-size: 11px; color: #666; }
        
        /* レシピリスト用 */
        ul { list-style: none; padding-left: 20px; }
        li { margin: 5px 0; cursor: pointer; position: relative; }
        .recipe-row { display: flex; align-items: center; border-bottom: 1px solid #eee; padding: 4px 0; }
        .cb { margin-right: 8px; cursor: pointer; }
        .item-name { flex: 1; }
        .detail-label { font-size: 9px; color: #007bff; margin-left: 10px; cursor: help; border: 1px solid; padding: 0 2px; border-radius: 3px; }
        .child-container { display: none; }
        
        /* コントロールパネル */
        .control-panel { background: #eee; padding: 10px; margin-bottom: 15px; border-radius: 5px; display: flex; align-items: center; gap: 15px; }
        .btn-reset { font-size: 10px; padding: 4px 8px; background: #dc3545; color: white; border: none; border-radius: 3px; cursor: pointer; }
        .btn-reset:hover { background: #c82333; }
    </style>
</head>
<body>

<nav id="side-menu">
    <div class="header-subtitle">ELLICIA ONLINE DB</div>
    <hr>
    <!-- サイドメニューがここに動的に生成される -->
</nav>

<main>
    <h2>生産レシピ・チェックリスト</h2>
    
    <!-- リセットボタンを含むコントロールパネル -->
    <div class="control-panel">
        <span style="font-size: 11px; color: #333;">進捗管理:</span>
        <button id="reset-checks" class="btn-reset">チェックをすべてクリア</button>
    </div>

    <div id="recipe-content">
        <!-- レシピのツリー構造がここに描画される -->
    </div>
</main>

<script>
    // --- 1. データ取得・描画ロジック ---

    // レシピ描画関数（再帰的に素材を表示）
    function renderRecipe(items, container) {
        const ul = document.createElement('ul');
        
        items.forEach(item => {
            const li = document.createElement('li');
            const row = document.createElement('div');
            row.className = 'recipe-row';

            // チェックボックスの作成
            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.className = 'cb';
            // 重要：保存用のキーとしてアイテム名（またはID）をセット
            cb.id = `item-${item.name}`; 
            
            // チェックが変わるたびに保存を実行
            cb.addEventListener('change', (e) => {
                e.stopPropagation();
                saveCheckStatus();
            });

            // 行クリックで子要素を開閉
            row.onclick = () => {
                const child = li.querySelector('.child-container');
                if (child) {
                    child.style.display = (child.style.display === 'block') ? 'none' : 'block';
                }
            };

            const nameSpan = document.createElement('span');
            nameSpan.className = 'item-name';
            nameSpan.innerText = `${item.name} × ${item.count || 1}`;

            // 入手方法ラベル
            if (item.drop) {
                const info = document.createElement('span');
                info.className = 'detail-label';
                info.innerText = '入手';
                info.onclick = (e) => {
                    e.stopPropagation();
                    alert(`入手先: ${item.drop}`);
                };
                nameSpan.appendChild(info);
            }

            row.appendChild(cb);
            row.appendChild(nameSpan);
            li.appendChild(row);

            // 子素材がある場合（再帰）
            if (item.materials && item.materials.length > 0) {
                const childContainer = document.createElement('div');
                childContainer.className = 'child-container';
                renderRecipe(item.materials, childContainer);
                li.appendChild(childContainer);
            }

            ul.appendChild(li);
        });
        
        container.appendChild(ul);
    }

    // --- 2. 保存・復元・リセットロジック ---

    // localStorageにチェック状態を保存
    function saveCheckStatus() {
        const checkStates = {};
        const checkboxes = document.querySelectorAll('.cb');
        
        checkboxes.forEach((cb) => {
            if (cb.id) {
                checkStates[cb.id] = cb.checked;
            }
        });
        
        localStorage.setItem('ellicia_recipe_checks', JSON.stringify(checkStates));
        console.log("Progress saved.");
    }

    // localStorageからチェック状態を復元
    function loadCheckStatus() {
        const savedData = localStorage.getItem('ellicia_recipe_checks');
        if (!savedData) return;

        const checkStates = JSON.parse(savedData);
        const checkboxes = document.querySelectorAll('.cb');

        checkboxes.forEach((cb) => {
            if (cb.id && checkStates[cb.id] !== undefined) {
                cb.checked = checkStates[cb.id];
            }
        });
        console.log("Progress restored.");
    }

    // 全リセット
    function resetAllChecks() {
        if (confirm('すべてのチェックをリセットしてもよろしいですか？')) {
            const checkboxes = document.querySelectorAll('.cb');
            checkboxes.forEach(cb => cb.checked = false);
            localStorage.removeItem('ellicia_recipe_checks');
        }
    }

    // --- 3. 初期化処理 ---

    // 本来はSupabaseから取得しますが、テスト用にサンプルデータで実行
    const sampleData = [
        {
            name: "英雄の剣",
            materials: [
                { name: "磨かれた鉄鉱石", count: 5, drop: "鉱山Lv2" },
                { 
                    name: "燃える魔石", 
                    count: 1, 
                    materials: [
                        { name: "火の欠片", count: 10, drop: "火山地帯" },
                        { name: "触媒液", count: 2, drop: "錬金ショップ" }
                    ]
                }
            ]
        }
    ];

    document.addEventListener('DOMContentLoaded', () => {
        const contentArea = document.getElementById('recipe-content');
        const resetBtn = document.getElementById('reset-checks');

        // 1. レシピの描画
        renderRecipe(sampleData, contentArea);

        // 2. 保存されていたチェック状態を復元
        loadCheckStatus();

        // 3. リセットボタンのイベント登録
        resetBtn.addEventListener('click', resetAllChecks);
    });

</script>

</body>
</html>
