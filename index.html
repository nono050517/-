<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>エリシア・アーカイブス (Ellicia Archives)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* --- 全体レイアウト --- */
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            font-family: "Helvetica Neue", "Arial", "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", sans-serif;
            color: #000;
            background-color: #fdf2f4; /* 非常に淡いピンクの背景 */
        }

        /* 左右1割の余白を作るためのラッパー */
        .wrapper {
            display: flex;
            flex-direction: column;
            width: 80%; /* 左右に10%ずつの余白 */
            margin: 0 auto;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            height: 100vh;
        }

        /* ① ヘッダー */
        header {
            background-color: #fff;
            border-bottom: 2px solid #ffb6c1;
        }
        .header-top {
            display: flex;
            justify-content: flex-end;
            padding: 8px 20px;
        }
        .wiki-title {
            color: #d02090;
            font-size: 20px; /* 少し小さめに */
            font-weight: bold;
            margin: 0;
        }
        .nav-bar {
            background-color: #333; /* 真っ黒より少し柔らかい黒 */
            color: #fff;
            padding: 4px 20px;
            display: flex;
            gap: 15px;
            font-size: 11px; /* 文字を小さく */
        }
        .nav-bar span { cursor: pointer; }

        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ② 左側：サイドバー */
        nav {
            width: 180px; /* 少し幅を狭く */
            background-color: #fff;
            border-right: 1px solid #ffdae0;
            padding: 10px;
            overflow-y: auto;
            font-size: 11px; /* 文字を小さく */
        }
        nav h3 {
            background-color: #fff0f5;
            border-left: 4px solid #ffb6c1;
            padding: 3px 8px;
            font-size: 12px;
            margin: 12px 0 4px 0;
        }
        nav ul { list-style: none; padding: 0; margin: 0; }
        nav li { margin: 2px 0; }
        nav a {
            text-decoration: none;
            color: #333;
            display: block;
            cursor: pointer;
            padding: 2px;
        }
        nav a:before { content: "┣"; margin-right: 4px; color: #ccc; }
        nav li:last-child a:before { content: "┗"; }
        nav a:hover { background-color: #fff0f5; color: #d02090; }

        /* ③ 右側：メインコンテンツ */
        main {
            flex: 1;
            padding: 15px 25px;
            overflow-y: auto;
            background-color: #fff;
            font-size: 13px; /* メイン文字サイズを調整 */
        }
        .content-box {
            min-height: 80%;
        }
        h2.page-title {
            color: #ff4500;
            font-size: 18px;
            border-bottom: 1px solid #eee;
            margin: 0 0 10px 0;
        }
        .wiki-section {
            background-color: #444;
            color: #fff;
            padding: 3px 10px;
            margin: 15px 0 8px 0;
            font-weight: bold;
            font-size: 12px;
        }

        /* --- 生産ツリー用スタイル --- */
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { background: #ffc0cb; border: 1px solid #ffb6c1; padding: 4px; text-align: left; }
        td { border: 1px solid #ffdae0; padding: 3px; }
        .row-job { background: #ffb6c1; color: #fff; font-weight: bold; cursor: pointer; }
        .row-skill { background: #fff0f5; font-weight: bold; cursor: pointer; }
        .tree-line { font-family: "MS Gothic", monospace; color: #ffb6c1; letter-spacing: -1px; }
        .method-label { font-size: 9px; padding: 0px 2px; border: 1px solid #ccc; border-radius: 2px; margin-left: 3px; background: #fff; }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <div class="header-top">
                <h1 class="wiki-title">エリシア・アーカイブス (Ellicia Archives)</h1>
            </div>
            <div class="nav-bar">
                <span onclick="showPage('front-page')">ホーム</span>
                <span>新規</span>
                <span>編集</span>
                <span>添付</span>
            </div>
        </header>

        <div class="container">
            <nav>
                <h3>■はじめに</h3>
                <ul>
                    <li><a onclick="showPage('front-page')">FrontPage</a></li>
                    <li><a>よくある質問(FAQ)</a></li>
                </ul>
                <h3>■ジョブ</h3>
                <ul>
                    <li><a>ソードマン</a></li>
                    <li><a>アーチャー</a></li>
                </ul>
                <h3>■生産</h3>
                <ul>
                    <li><a onclick="showPage('production-page')">生産データ一覧</a></li>
                </ul>
            </nav>

            <main>
                <div id="content-area" class="content-box">
                    <!-- フロントページ -->
                    <div id="front-page">
                        <h2 class="page-title">FrontPage</h2>
                        <div class="wiki-section">概要</div>
                        <p>『エリシアオンライン』の生産レシピやアイテム情報を網羅する個人用アーカイブスです。</p>
                        <div class="wiki-section">更新履歴</div>
                        <p style="font-size: 11px;">・2026/05/02：デザインを「アーカイブス」仕様に変更</p>
                    </div>

                    <!-- 生産データページ -->
                    <div id="production-page" class="hidden">
                        <h2 class="page-title">生産データ一覧</h2>
                        <table>
                            <thead>
                                <tr><th>🌸 生産レシピ・チェックリスト 🌸</th></tr>
                            </thead>
                            <tbody id="recipe-body">
                                <tr><td>データ読み込み中...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const S_URL = 'https://djfklvgrpdehqzhhodyg.supabase.co'; 
        const S_KEY = 'sb_publishable_ywFWyEJawcabWW8nHoETtQ_l-JyNOfC';
        const client = supabase.createClient(S_URL, S_KEY);

        function showPage(pageId) {
            document.getElementById('front-page').classList.add('hidden');
            document.getElementById('production-page').classList.add('hidden');
            document.getElementById(pageId).classList.remove('hidden');
            if(pageId === 'production-page') loadAllRecipes();
        }

        async function loadAllRecipes() {
            const tbody = document.getElementById('recipe-body');
            try {
                const [rRes, jRes] = await Promise.all([
                    client.from('recipes').select('*').order('skill_type').order('skill_lv'),
                    client.from('job_masters').select('*')
                ]);
                const recipes = rRes.data || [];
                const jobsData = jRes.data || [];

                let html = '';
                jobsData.forEach((job, jIdx) => {
                    const jobRecipes = recipes.filter(r => r.required_jobs === job.short_name);
                    if (jobRecipes.length === 0) return;
                    html += `<tr class="row-job"><td>${job.full_name}</td></tr>`;
                    // ※簡易表示。詳細ロジックは前回同様に組み込み可能
                    jobRecipes.forEach(r => {
                        html += `<tr><td><span class="tree-line">┗ </span> 【${r.recipe_name}】</td></tr>`;
                    });
                });
                tbody.innerHTML = html;
            } catch (e) { tbody.innerHTML = `<tr><td>読み込み失敗</td></tr>`; }
        }
    </script>
</body>
</html>
