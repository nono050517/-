<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>エリシア・アーカイブス (Ellicia Archives)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* --- 全体レイアウト --- */
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            font-family: "Helvetica Neue", "Arial", "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", sans-serif;
            color: #5d4037; /* バナーに合わせた濃いブラウン系 */
            background-color: #f4eade; /* アンティークペーパー風の背景色 */
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            width: 80%;
            margin: 0 auto;
            background-color: #fffaf0; /* コンテンツエリアは少し明るいアイボリー */
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            height: 100vh;
        }

        /* ① ヘッダー：バナー画像を表示 */
        header {
            background-color: #fff;
            border-bottom: 2px solid #d2b48c; /* タンカラーの境界線 */
            text-align: center;
        }
        .header-banner {
            width: 100%;
            display: block;
        }
        /* テキストなしのナビバー（枠だけ残して高さを調整） */
        .nav-bar {
            background-color: #8b5a5a; /* バナーの装飾に近い色 */
            height: 12px;
            width: 100%;
        }

        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ② 左側：サイドバー */
        nav {
            width: 180px;
            background-color: #fffaf0;
            border-right: 1px solid #e0d0c0;
            padding: 10px;
            overflow-y: auto;
            font-size: 11px;
        }
        nav h3 {
            background-color: #f5e1e1; /* くすみピンク */
            border-left: 4px solid #8b5a5a;
            padding: 3px 8px;
            font-size: 12px;
            margin: 12px 0 4px 0;
            color: #8b5a5a;
        }
        nav ul { list-style: none; padding: 0; margin: 0; }
        nav li { margin: 2px 0; }
        nav a {
            text-decoration: none;
            color: #5d4037;
            display: block;
            cursor: pointer;
            padding: 2px;
        }
        nav a:before { content: "┣"; margin-right: 4px; color: #d2b48c; }
        nav li:last-child a:before { content: "┗"; }
        nav a:hover { background-color: #f5e1e1; color: #8b5a5a; }

        /* ③ 右側：メインコンテンツ */
        main {
            flex: 1;
            padding: 15px 25px;
            overflow-y: auto;
            background-color: #fff;
            font-size: 13px;
        }
        h2.page-title {
            color: #8b5a5a;
            font-size: 18px;
            border-bottom: 2px solid #f5e1e1;
            margin: 0 0 10px 0;
            padding-bottom: 5px;
        }
        .wiki-section {
            background-color: #8b5a5a;
            color: #fff;
            padding: 3px 10px;
            margin: 15px 0 8px 0;
            font-weight: bold;
            font-size: 11px;
            border-radius: 2px;
        }

        /* 更新履歴エリア */
        .history-box {
            background-color: #fdf5f5;
            border: 1px solid #f5e1e1;
            padding: 8px 12px;
            font-size: 11px;
            color: #7d5a5a;
        }

        /* --- 生産ツリー用スタイル（色はバナー調に統一） --- */
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { background: #f5e1e1; border: 1px solid #e0d0c0; padding: 4px; text-align: left; color: #8b5a5a; }
        td { border: 1px solid #e0d0c0; padding: 3px; }
        .row-job { background: #d2b48c; color: #fff; font-weight: bold; cursor: pointer; }
        .tree-line { font-family: "MS Gothic", monospace; color: #d2b48c; letter-spacing: -1px; }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <!-- バナー画像を最上部に配置 -->
            <img src="input_file_0.png" alt="Ellicia Archives Banner" class="header-banner">
            <div class="nav-bar"></div>
        </header>

        <div class="container">
            <nav>
                <h3>■はじめに</h3>
                <ul>
                    <li><a onclick="showPage('front-page')">FrontPage</a></li>
                    <li><a>よくある質問(FAQ)</a></li>
                </ul>
                <h3>■生産</h3>
                <ul>
                    <li><a onclick="showPage('production-page')">生産データ一覧</a></li>
                </ul>
            </nav>

            <main>
                <div id="content-area" class="content-box">
                    <!-- フロントページ -->
                    <div id="front-page">
                        <h2 class="page-title">FrontPage</h2>
                        <div class="wiki-section">概要</div>
                        <p>『エリシアオンライン』の歴史と技術を記したアーカイブスへようこそ。</p>
                        
                        <div class="wiki-section">更新履歴</div>
                        <div class="history-box">
                            ・2026/05/02：専用バナーを導入し、アーカイブス仕様に全面リニューアル
                        </div>
                    </div>

                    <!-- 生産データページ -->
                    <div id="production-page" class="hidden">
                        <h2 class="page-title">生産データ一覧</h2>
                        <table>
                            <thead>
                                <tr><th>🕰️ 復元された生産レシピ 🕰️</th></tr>
                            </thead>
                            <tbody id="recipe-body">
                                <tr><td>記録を照合中...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        // Supabase設定
        const S_URL = 'https://djfklvgrpdehqzhhodyg.supabase.co'; 
        const S_KEY = 'sb_publishable_ywFWyEJawcabWW8nHoETtQ_l-JyNOfC';
        const client = supabase.createClient(S_URL, S_KEY);

        function showPage(pageId) {
            document.getElementById('front-page').classList.add('hidden');
            document.getElementById('production-page').classList.add('hidden');
            document.getElementById(pageId).classList.remove('hidden');
            if(pageId === 'production-page') loadAllRecipes();
        }

        async function loadAllRecipes() {
            const tbody = document.getElementById('recipe-body');
            try {
                const [rRes, jRes] = await Promise.all([
                    client.from('recipes').select('*').order('skill_type').order('skill_lv'),
                    client.from('job_masters').select('*')
                ]);
                const recipes = rRes.data || [];
                const jobsData = jRes.data || [];

                let html = '';
                jobsData.forEach((job) => {
                    const jobRecipes = recipes.filter(r => r.required_jobs === job.short_name);
                    if (jobRecipes.length === 0) return;
                    html += `<tr class="row-job"><td>${job.full_name}</td></tr>`;
                    jobRecipes.forEach(r => {
                        html += `<tr><td><span class="tree-line">┗ </span> ${r.output_item_name} （${r.recipe_name}）</td></tr>`;
                    });
                });
                tbody.innerHTML = html;
            } catch (e) { tbody.innerHTML = `<tr><td>読み込み失敗</td></tr>`; }
        }
    </script>
</body>
</html>
