<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>エリシア・アーカイブス (Ellicia Archives)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* --- 1. 全体レイアウト --- */
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            font-family: "Helvetica Neue", "Arial", "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", sans-serif;
            color: #5d4037;
            background-color: #f4eade;
            font-size: 10px;
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            width: 80%;
            margin: 0 auto;
            background-color: #fffaf0;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            height: 100vh;
        }

        header {
            background-color: #fff;
            border-bottom: 2px solid #d2b48c;
            padding: 15px 30px;
        }
        .header-title {
            margin: 0;
            color: #8b5a5a;
            font-size: 18px;
            letter-spacing: 1px;
        }
        .header-subtitle {
            margin: 2px 0 0 0;
            color: #a08080;
            font-size: 10px;
            font-weight: normal;
        }
        .nav-bar {
            background-color: #8b5a5a;
            height: 8px;
            width: 100%;
        }

        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* --- 2. サイドバー --- */
        nav {
            width: 160px;
            background-color: #fffaf0;
            border-right: 1px solid #e0d0c0;
            padding: 10px;
            overflow-y: auto;
            font-size: 9px;
        }
        nav h3 {
            background-color: #f5e1e1;
            border-left: 4px solid #8b5a5a;
            padding: 3px 8px;
            font-size: 10px;
            margin: 12px 0 4px 0;
            color: #8b5a5a;
        }
        nav ul { list-style: none; padding: 0; margin: 0; }
        nav li { margin: 2px 0; }
        nav a {
            text-decoration: none;
            color: #5d4037;
            display: block;
            cursor: pointer;
            padding: 2px;
        }
        nav a:before { content: "┣"; margin-right: 4px; color: #d2b48c; }
        nav li:last-child a:before { content: "┗"; }
        nav a:hover { background-color: #f5e1e1; color: #8b5a5a; }

        /* --- 3. メインコンテンツ --- */
        main {
            flex: 1;
            padding: 15px 35px;
            overflow-y: auto;
            background-color: #fff;
            font-size: 11px;
        }
        h2.page-title {
            color: #8b5a5a;
            font-size: 16px;
            border-bottom: 2px solid #f5e1e1;
            margin: 0 0 20px 0;
            padding-bottom: 8px;
        }

        .fp-section { margin-bottom: 30px; }
        .fp-section h3 {
            border-left: 4px solid #8b5a5a;
            padding-left: 12px;
            font-size: 12px;
            color: #8b5a5a;
            margin: 25px 0 10px 0;
        }
        .fp-section ul { list-style: none; padding: 0; margin: 10px 0 15px 25px; }
        .fp-section li { position: relative; padding-left: 1.5em; line-height: 1.8; margin-bottom: 8px; }
        .fp-section li::before { content: "・"; position: absolute; left: 0; color: #8b5a5a; font-weight: bold; }

        .history-box {
            background-color: #fdf5f5;
            border: 1px solid #f5e1e1;
            padding: 10px 15px;
            font-size: 10px;
            color: #7d5a5a;
            max-height: 100px; 
            overflow-y: auto;
            line-height: 1.6;
        }

        .hidden { display: none !important; }

        /* --- 4. 生産データ一覧テーブル --- */
        table { width: 100%; border-collapse: collapse; line-height: 1.3; background-color: #fff; }
        th { border: 1px solid #ffb6c1; padding: 4px; text-align: left; background: #ffc0cb; color: #000; font-weight: bold; position: sticky; top: 0; z-index: 10; font-size: 10px; }
        td { border: 1px solid #ffdae0; padding: 2px 4px; color: #000; font-size: 9px; vertical-align: top; }
        
        .row-job { background: #ffb6c1; color: #fff !important; font-weight: bold; cursor: pointer; height: 22px; }
        .row-skill { background: #fff0f5; color: #000; font-weight: bold; cursor: pointer; }
        .row-recipe { color: #000; font-weight: bold; cursor: pointer; background-color: #fffafb; }
        .row-output { font-weight: bold; color: #333; }
        .row-material { color: #666; }
        
        .tree-line { font-family: "MS Gothic", monospace; white-space: pre; color: #ffc0cb; font-size: 10px; }
        .toggle-icon { display: inline-block; width: 12px; text-align: center; margin-right: 5px; color: #d02090; font-family: monospace; }

        .method-label {
            display: inline-block; font-size: 8px; padding: 0px 2px; margin-left: 4px;
            border-radius: 3px; cursor: pointer; border: 1px solid #ccc; background: #fff;
            vertical-align: middle;
        }
        .label-buy { color: #ff8c00; border-color: #ff8c00; }
        .label-drop { color: #2e8b57; border-color: #2e8b57; }

        .source-container {
            font-size: 8px; background: #fffafa; border: 1px solid #ffb6c1;
            padding: 5px; margin: 4px 0 4px 40px; border-radius: 4px; color: #333;
            line-height: 1.4;
        }
        .cb { vertical-align: middle; margin: 0 3px; cursor: pointer; accent-color: #e91e63; transform: scale(0.8); }
    </style>
</head>
<body onload="initApp()">

    <div class="wrapper">
        <header>
            <h1 class="header-title">エリシアオンライン　アーカイブス</h1>
            <h2 class="header-subtitle">Ellicia-Online Archives</h2>
        </header>
        <div class="nav-bar"></div>

        <div class="container">
            <nav id="sidebar-nav">
                <h3>■はじめに</h3>
                <ul>
                    <li><a onclick="showPage('front-page')">FrontPage</a></li>
                    <li><a onclick="showPage('faq-page')">よくある質問(FAQ)</a></li>
                </ul>
                <h3>■生産</h3>
                <ul>
                    <li><a onclick="showPage('production-page')">生産データ一覧</a></li>
                </ul>
            </nav>

            <main id="main-scroll">
                <!-- 1. FrontPage -->
                <div id="front-page">
                    <h2 class="page-title">FrontPage</h2>
                    <div class="fp-section">
                        <h3>1. 概要</h3>
                        <p>エリシアオンラインのアイテムや生産レシピの情報をまとめた非公式データベースです。</p>
                        <h3>2. 更新履歴</h3>
                        <div class="history-box" id="update-history">読み込み中...</div>
                    </div>
                </div>

                <!-- 2. FAQ Page -->
                <div id="faq-page" class="hidden">
                    <h2 class="page-title">よくある質問(FAQ)</h2>
                    <p>コンテンツ準備中...</p>
                </div>

                <!-- 3. Production Page -->
                <div id="production-page" class="hidden">
                    <h2 class="page-title">エリシア生産データ一覧（Archives Ver.）</h2>
                    <table>
                        <thead><tr><th>🌸 生産レシピ・チェックリスト 🌸</th></tr></thead>
                        <tbody id="recipe-body"><tr><td>データ読み込み中...</td></tr></tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <script>
        const S_URL = 'https://djfklvgrpdehqzhhodyg.supabase.co'; 
        const S_KEY = 'sb_publishable_ywFWyEJawcabWW8nHoETtQ_l-JyNOfC';
        const client = supabase.createClient(S_URL, S_KEY);

        function initApp() { loadUpdates(); showPage('front-page'); }

        async function loadUpdates() {
            const historyBox = document.getElementById('update-history');
            try {
                const { data, error } = await client.from('site_updates').select('*').order('date', { ascending: false });
                if (error || !data || data.length === 0) { historyBox.innerHTML = "・2026/05/02：アーカイブスサイト開設"; return; }
                historyBox.innerHTML = data.map(item => `・${item.date}：${item.content}`).join('<br>');
            } catch (e) { historyBox.innerHTML = "履歴の読み込みに失敗しました。"; }
        }

        function showPage(pageId) {
            const sections = ['front-page', 'faq-page', 'production-page'];
            sections.forEach(id => document.getElementById(id)?.classList.add('hidden'));
            document.getElementById(pageId)?.classList.remove('hidden');
            if(pageId === 'production-page') loadAllRecipes();
        }

        async function loadAllRecipes() {
            const tbody = document.getElementById('recipe-body');
            if (tbody.getAttribute('data-loaded') === 'true') return;
            
            try {
                const [rRes, iRes] = await Promise.all([
                    client.from('recipes').select('*').order('job_type').order('skill_type').order('skill_lv'),
                    client.from('items').select('*')
                ]);

                const recipes = rRes.data || [];
                const itemsData = iRes.data || [];

                let html = '';
                let lastJob = '';
                let lastSkill = '';
                let lastRecipeName = '';

                recipes.forEach((rec, index) => {
                    // 1. 職種階層
                    if (rec.job_type !== lastJob) {
                        html += `<tr class="row-job" onclick="toggleLayer('job-${index}')">
                                    <td><span class="toggle-icon">▼</span>${rec.job_type}</td>
                                 </tr>`;
                        lastJob = rec.job_type;
                    }

                    // 2. スキル階層
                    const skillKey = `${rec.job_type}-${rec.skill_type}-${rec.skill_lv}`;
                    if (skillKey !== lastSkill) {
                        html += `<tr class="row-skill layer-job-${index}" onclick="toggleLayer('skill-${index}')">
                                    <td><span class="tree-line">  ┗ </span><span class="toggle-icon">▼</span>${rec.skill_type} (Lv${rec.skill_lv})</td>
                                 </tr>`;
                        lastSkill = skillKey;
                    }

                    // 3. レシピ名階層（これが今回の修正の鍵）
                    if (rec.recipe_name !== lastRecipeName) {
                        html += `<tr class="row-recipe layer-skill-${index}" onclick="toggleLayer('rec-${index}')">
                                    <td><span class="tree-line">    ┣ </span><span class="toggle-icon">▼</span>【${rec.recipe_name}】</td>
                                 </tr>`;
                        lastRecipeName = rec.recipe_name;
                    }

                    // 4. 成果物階層
                    const recId = `output-${index}`;
                    html += `<tr class="row-output layer-rec-${index}">
                                <td>
                                    <span class="tree-line">    ┃  ┗ </span>
                                    <input type="checkbox" class="cb">
                                    <strong>${rec.result_item_name}</strong> (×${rec.yield_quantity || 1})
                                </td>
                             </tr>`;

                    // 5. 素材階層
                    if (rec.materials && Array.isArray(rec.materials)) {
                        rec.materials.forEach((mat, mIdx) => {
                            const itemInfo = itemsData.find(i => i.item_name === mat.item_name);
                            let labels = '';
                            if (itemInfo) {
                                if (itemInfo.is_buyable) labels += `<span class="method-label label-buy" onclick="toggleSource('src-${index}-${mIdx}')">購入</span>`;
                                if (itemInfo.is_drop) labels += `<span class="method-label label-drop" onclick="toggleSource('src-${index}-${mIdx}')">ドロップ</span>`;
                            }

                            html += `<tr class="row-material layer-rec-${index}">
                                        <td>
                                            <span class="tree-line">    ┃      ${mIdx === rec.materials.length - 1 ? '┗' : '┣'} </span>
                                            <input type="checkbox" class="cb">
                                            ${mat.item_name} (×${mat.quantity})${labels}
                                            <div id="src-${index}-${mIdx}" class="source-container hidden">
                                                ${itemInfo?.drop_at || itemInfo?.buy_at || '詳細情報なし'}
                                            </div>
                                        </td>
                                     </tr>`;
                        });
                    }
                });

                tbody.innerHTML = html;
                tbody.setAttribute('data-loaded', 'true');
            } catch (e) { tbody.innerHTML = `<tr><td>エラー: ${e.message}</td></tr>`; }
        }

        function toggleLayer(cls) {
            const rows = document.querySelectorAll('.layer-' + cls);
            rows.forEach(row => {
                row.classList.toggle('hidden');
                // 閉じる時はその下の子要素も全部閉じる
                if (row.classList.contains('hidden')) {
                    const subCls = row.getAttribute('onclick')?.match(/'(.*?)'/)?.[1];
                    if (subCls) {
                        document.querySelectorAll('.layer-' + subCls).forEach(sub => sub.classList.add('hidden'));
                    }
                }
            });
        }

        function toggleSource(id) {
            document.getElementById(id)?.classList.toggle('hidden');
        }
    </script>
</body>
</html>
