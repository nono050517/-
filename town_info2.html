<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>エリア詳細 - エリシア・アーカイブス</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 2カラムレイアウト用スタイル */
        .drilldown-wrapper {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }
        .town-list-sidebar {
            width: 250px;
            flex-shrink: 0;
            border-right: 1px solid #eee;
            padding-right: 15px;
        }
        .main-detail-area {
            flex-grow: 1;
        }
        .town-link {
            display: block;
            padding: 8px;
            text-decoration: none;
            color: #333;
            border-bottom: 1px solid #f0f0f0;
        }
        .town-link:hover { background: #f9f9f9; }
        .town-link.active { font-weight: bold; color: #d02090; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <nav id="sidebar-nav"></nav>
            <main>
                <h2 class="page-title" id="map-main-title">マップ・街情報</h2>
                
                <div class="drilldown-wrapper">
                    <div class="town-list-sidebar">
                        <h3>街一覧</h3>
                        <div id="town-list">読み込み中...</div>
                    </div>

                    <div class="main-detail-area" id="map-detail-content">
                        <p>左側の街を選択してください。</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        // Supabase設定（ご自身のキーを入力してください）
        const supabase = supabase.createClient('YOUR_SUPABASE_URL', 'YOUR_SUPABASE_KEY');

        async function init() {
            // 1. 街一覧を取得
            const { data: towns, error } = await supabase
                .from('maps') // テーブル名は実際の名称に合わせてください
                .select('id, map_name')
                .eq('map_type', 'town');

            const listDiv = document.getElementById('town-list');
            if (towns) {
                listDiv.innerHTML = towns.map(town => 
                    `<a href="?id=${town.id}" class="town-link">${town.map_name}</a>`
                ).join('');
            }

            // 2. 現在のパラメータに基づいて詳細を表示
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (id) {
                loadMapDetail(id);
            }
        }

        async function loadMapDetail(id) {
            const detailArea = document.getElementById('map-detail-content');
            detailArea.innerHTML = "読み込み中...";
            
            // ここに詳細データを取得して表示する処理を記述
            // 以前のloadMapDetailData関数の内容をここに配置します
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
