<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>エリシア生産データ一覧</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: "Meiryo", sans-serif; margin: 0; padding: 5px; color: #000; font-size: 11px; }
        table { width: 100%; border-collapse: collapse; line-height: 1.4; table-layout: fixed; }
        th, td { border: 1px solid #444; padding: 2px 4px; text-align: left; vertical-align: top; }
        th { background: #d2d2d2; font-weight: bold; position: sticky; top: 0; z-index: 10; }
        
        /* 親レシピ行 */
        .row-recipe-header { background: #f0f0f0; font-weight: bold; font-size: 12px; }
        .skill-title { font-weight: bold; }
        
        /* レシピ名行（スキル名の直下） */
        .row-recipe-name { background: #fafafa; font-weight: bold; color: #333; }
        
        /* 完成品行 */
        .row-output { background: #e8f0ff !important; font-weight: bold; }
        .row-sub { color: #555; }
        
        .job-col { width: 100px; }
        .skill-col { width: 160px; }
        
        .qty-inline { color: #d00; font-weight: bold; margin-right: 8px; }
        .loc-inline { color: #b35900; font-weight: bold; }
        .craft-inline { color: #0066cc; font-weight: bold; margin-left: 10px; }
        .craft-lv { color: #0066cc; font-weight: bold; }
        
        .cb { vertical-align: middle; margin: 0 6px 0 2px; cursor: pointer; }
        .tree-line { font-family: "Consolas", "Monaco", monospace; white-space: pre; color: #bbb; display: inline-block; letter-spacing: 0.1em; }
        
        /* レシピごとの区切りを少し分かりやすく */
        .recipe-group-separator { border-top: 2px solid #888 !important; }
    </style>
</head>
<body>

    <table>
        <thead>
            <tr>
                <th class="job-col">職業</th>
                <th class="skill-col">スキル (Lv)</th>
                <th>レシピ構成（チェックリスト）</th>
            </tr>
        </thead>
        <tbody id="recipe-body">
            <tr><td colspan="3">読み込み中...</td></tr>
        </tbody>
    </table>

    <script>
        const S_URL = 'https://djfklvgrpdehqzhhodyg.supabase.co'; 
        const S_KEY = 'sb_publishable_ywFWyEJawcabWW8nHoETtQ_l-JyNOfC';
        const client = supabase.createClient(S_URL, S_KEY);

        async function loadAllRecipes() {
            const tbody = document.getElementById('recipe-body');
            const [rRes, iRes, jRes] = await Promise.all([
                client.from('recipes').select('*').order('required_jobs').order('skill_type').order('skill_lv'),
                client.from('items').select('*'),
                client.from('job_masters').select('*')
            ]);

            const recipes = rRes.data || [];
            const itemsData = iRes.data || [];
            const jobsData = jRes.data || [];

            const getFullJobName = (shortName) => {
                if (!shortName) return '';
                const match = jobsData.find(j => j.short_name === shortName);
                return match ? match.full_name : shortName;
            };

            const getLocText = (itemName) => {
                const match = itemsData.find(item => item.name === itemName && item.method === "購入");
                return match ? `購入：${match.location} - ${match.target}` : '';
            };

            const renderMaterials = (recipe, depth = 0, parentTrace = []) => {
                let rows = '';
                const materials = [];
                for (let i = 1; i <= 4; i++) {
                    if (recipe[`material_${i}`] && recipe[`material_${i}`] !== 'NULL') {
                        materials.push({ name: recipe[`material_${i}`], qty: recipe[`amount_${i}`] });
                    }
                }

                materials.forEach((m, idx) => {
                    const isLast = (idx === materials.length - 1);
                    let prefix = '   '; 
                    parentTrace.forEach(isParentLast => { prefix += isParentLast ? '   ' : '│  '; });
                    const mark = isLast ? '┗' : '┣';
                    const subR = recipes.find(r => r.output_item_name === m.name);
                    
                    let craftInfo = '';
                    if (subR) {
                        const fullJob = getFullJobName(subR.required_jobs);
                        craftInfo = `<span class="craft-inline">生産：${fullJob}：${subR.skill_type}<span class="craft-lv">(Lv${subR.skill_lv})</span>：${subR.recipe_name}</span>`;
                    }

                    rows += `
                    <tr class="row-material ${depth > 0 ? 'row-sub' : ''}">
                        <td colspan="2"></td>
                        <td>
                            <span class="tree-line">${prefix}${mark}</span>
                            <input type="checkbox" class="cb"><span>${m.name}</span>
                            <span class="qty-inline">(×${m.qty || 0})</span>
                            <span class="loc-inline">${getLocText(m.name)}</span>
                            ${craftInfo}
                        </td>
                    </tr>`;

                    if (subR) rows += renderMaterials(subR, depth + 1, [...parentTrace, isLast]);
                });
                return rows;
            };

            // グルーピング処理
            const grouped = {};
            recipes.forEach(r => {
                const key = `${r.required_jobs}_${r.skill_type}_${r.skill_lv}`;
                if (!grouped[key]) grouped[key] = { job: r.required_jobs, skill: r.skill_type, lv: r.skill_lv, list: [] };
                grouped[key].list.push(r);
            });

            let html = '';
            Object.values(grouped).forEach((group, gIdx) => {
                const fullJob = getFullJobName(group.job);
                const skillWithLv = `<span class="skill-title">${group.skill} (Lv${group.lv})</span>`;
                
                // 親ヘッダー（職業・スキル）
                html += `
                <tr class="row-recipe-header ${gIdx > 0 ? 'recipe-group-separator' : ''}">
                    <td>${fullJob}</td>
                    <td>${skillWithLv}</td>
                    <td>（レシピ一覧）</td>
                </tr>`;

                group.list.forEach(r => {
                    // 各レシピ名
                    html += `<tr class="row-recipe-name"><td colspan="2"></td><td>【${r.recipe_name}】</td></tr>`;
                    
                    // 完成品
                    html += `
                    <tr class="row-output">
                        <td colspan="2"></td>
                        <td>
                            <span class="tree-line">┗</span>
                            <input type="checkbox" class="cb"><span>${r.output_item_name}</span>
                            <span class="loc-inline">${getLocText(r.output_item_name)}</span>
                        </td>
                    </tr>`;
                    
                    // 素材ツリー
                    html += renderMaterials(r, 0, []);
                });
            });
            tbody.innerHTML = html;
        }
        loadAllRecipes();
    </script>
</body>
</html>
