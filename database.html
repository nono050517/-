<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>エリシア攻略：全レシピ階層表示</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #fff; color: #202122; line-height: 1.5; }
        .main-content { padding: 30px 50px; max-width: 1200px; margin: auto; }
        h1 { font-family: serif; border-bottom: 1px solid #a2a9b1; font-weight: normal; margin-bottom: 25px; }
        
        .tree-container { border: 1px solid #a2a9b1; background: #f8f9fa; padding: 20px; border-radius: 4px; }
        .tree-node { list-style: none; padding-left: 0; }
        .tree-node ul { 
            list-style: none; 
            padding-left: 35px; 
            border-left: 1px solid #c8ccd1; 
            margin: 6px 0;
        }
        .tree-node li { padding: 6px 12px; border-bottom: 1px solid #eef0f2; }
        .tree-node li:hover { background-color: #eaf3ff; }

        .item-name { font-weight: bold; font-size: 1.05em; }
        .qty-num { color: #d33; font-weight: bold; margin: 0 10px; font-size: 1.1em; background: #fff5f5; padding: 1px 5px; border-radius: 3px; border: 1px solid #ffdada; }
        .info-text { color: #54595d; font-size: 0.85em; font-weight: normal; }
        .shop-tag { 
            color: #0066cc; font-size: 0.82em; background: #fff; 
            padding: 2px 8px; border: 1px solid #a2a9b1; border-radius: 3px; margin-left: 10px;
        }
        .root-item { margin-top: 30px; border-top: 3px double #a2a9b1; padding-top: 15px; }
    </style>
</head>
<body>

    <div class="main-content">
        <h1>エリシア生産データベース（全一覧）</h1>
        <div id="display-area" class="tree-container">
            <ul id="tree-root" class="tree-node">
                <li>データベースを読み込み中...</li>
            </ul>
        </div>
    </div>

    <script>
        const S_URL = 'https://djfklvgrpdehqzhhodyg.supabase.co'; 
        const S_KEY = 'sb_publishable_ywFWyEJawcabWW8nHoETtQ_l-JyNOfC';
        const client = supabase.createClient(S_URL, S_KEY);

        async function buildTree(itemName, totalNeeded = 1) {
            const { data: recipes } = await client.from('recipes').select('*').eq('output_item_name', itemName);
            
            let html = `<li>`;
            if (recipes && recipes.length > 0) {
                const r = recipes[0];
                html += `<span class="item-name">■ ${itemName}</span>`;
                html += `<span class="qty-num">${totalNeeded} 個</span>`;
                html += `<span class="info-text">(${r.recipe_name || ''} / Lv.${r.skill_lv || ''})</span>`;
                if(r.location) html += `<span class="shop-tag">場所: ${r.location}</span>`;

                html += `<ul>`;
                for (let i = 1; i <= 3; i++) {
                    const mName = r[`material_${i}`];
                    // 修正：文字列を確実に数値へ変換。NaNや空なら1として扱う
                    let rawVal = r[`material_${i}_qty`];
                    let mQty = Number(rawVal);
                    if (isNaN(mQty) || mQty <= 0) mQty = 1;

                    if (mName && mName !== 'NULL' && mName !== '') {
                        // 子の必要数 = この素材の必要数 × 上位アイテムの必要数
                        html += await buildTree(mName, mQty * totalNeeded);
                    }
                }
                html += `</ul>`;
            } else {
                // 素材
                html += `<span class="item-name">・ ${itemName}</span>`;
                html += `<span class="qty-num">${totalNeeded} 個</span>`;
                
                const { data: itemInfo } = await client.from('recipes').select('location').eq('output_item_name', itemName).limit(1);
                const loc = (itemInfo && itemInfo[0] && itemInfo[0].location) ? itemInfo[0].location : "ショップ・採取";
                html += `<span class="shop-tag">${loc}</span>`;
            }
            html += `</li>`;
            return html;
        }

        async function loadAllTrees() {
            const root = document.getElementById('tree-root');
            const { data: allItems, error } = await client.from('recipes').select('output_item_name');
            
            if (error || !allItems) {
                root.innerHTML = '<li>データの取得に失敗しました。</li>';
                return;
            }

            const uniqueItems = [...new Set(allItems.map(item => item.output_item_name))];
            
            root.innerHTML = '';
            for (const itemName of uniqueItems) {
                // 各アイテムを「完成品(1個)」としてツリー構築開始
                const treeHtml = await buildTree(itemName, 1);
                const wrapper = document.createElement('div');
                wrapper.className = 'root-item';
                wrapper.innerHTML = treeHtml;
                root.appendChild(wrapper);
            }
        }

        loadAllTrees();
    </script>
</body>
</html>
