<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>エリシア生産データ一覧</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 5px; color: #000; font-size: 11px; }
        table { width: 100%; border-collapse: collapse; line-height: 1.2; }
        th, td { border: 1px solid #444; padding: 2px 4px; text-align: left; }
        th { background: #d2d2d2; font-weight: bold; position: sticky; top: 0; }
        
        .row-output { background: #e8f0ff !important; font-weight: bold; }
        .row-material { background: #fff; }
        
        .lv { text-align: center; width: 25px; }
        .qty-inline { color: #d00; font-weight: bold; margin-right: 8px; }
        .loc-inline { color: #b35900; font-weight: bold; }
        
        /* インデント（字下げ）の調整 */
        .indent-1 { padding-left: 15px !important; } /* 完成品用 */
        .indent-2 { padding-left: 35px !important; color: #666; } /* 素材用 */
    </style>
</head>
<body>

    <table>
        <thead>
            <tr>
                <th>職業</th>
                <th>スキル</th>
                <th class="lv">Lv</th>
                <th>レシピ構成（名称・数量・入手先）</th>
            </tr>
        </thead>
        <tbody id="recipe-body">
            <tr><td colspan="4">データ読み込み中...</td></tr>
        </tbody>
    </table>

    <script>
        const S_URL = 'https://djfklvgrpdehqzhhodyg.supabase.co'; 
        const S_KEY = 'sb_publishable_ywFWyEJawcabWW8nHoETtQ_l-JyNOfC';
        const client = supabase.createClient(S_URL, S_KEY);

        async function loadAllRecipes() {
            const tbody = document.getElementById('recipe-body');
            
            const [rRes, iRes] = await Promise.all([
                client.from('recipes').select('*').order('skill_type').order('skill_lv'),
                client.from('items').select('*')
            ]);

            if (rRes.error) {
                tbody.innerHTML = '<tr><td colspan="4">エラー: ' + rRes.error.message + '</td></tr>';
                return;
            }

            const recipes = rRes.data;
            const itemsData = iRes.data || [];

            const getLocText = (itemName) => {
                if (!itemName) return '';
                const match = itemsData.find(item => 
                    item.name === itemName && item.method === "購入"
                );
                return match && match.location ? `購入：${match.location} - ${match.target}` : '';
            };

            let html = '';
            recipes.forEach(r => {
                // 1. レシピ名行
                html += `
                <tr class="row-recipe">
                    <td>${r.required_jobs || ''}</td>
                    <td>${r.skill_type || ''}</td>
                    <td class="lv">${r.skill_lv || ''}</td>
                    <td style="font-weight:bold; background:#f9f9f9;">${r.recipe_name || ''}</td>
                </tr>`;

                // 2. 完成品行（レシピ名の下にぶら下がる）
                const outLoc = getLocText(r.output_item_name);
                html += `
                <tr class="row-output">
                    <td colspan="3"></td>
                    <td class="indent-1">┗ ${r.output_item_name || ''} <span class="loc-inline">${outLoc}</span></td>
                </tr>`;

                // 3. 素材の配列を作成（空文字を除去）
                const materials = [];
                for (let i = 1; i <= 4; i++) {
                    if (r[`material_${i}`] && r[`material_${i}`] !== 'NULL') {
                        materials.push({
                            name: r[`material_${i}`],
                            qty: r[`amount_${i}`],
                            num: i
                        });
                    }
                }

                // 4. 素材行のループ（記号の使い分け）
                materials.forEach((m, index) => {
                    const isLast = (index === materials.length - 1);
                    const mark = isLast ? '┗' : '┣'; // 最後なら ┗、途中なら ┣
                    const mLoc = getLocText(m.name);
                    
                    html += `
                    <tr class="row-material">
                        <td colspan="3"></td>
                        <td class="indent-2">
                            ${mark} 素材${m.num}：${m.name} 
                            <span class="qty-inline">(×${m.qty || 0})</span>
                            <span class="loc-inline">${mLoc}</span>
                        </td>
                    </tr>`;
                });
            });
            tbody.innerHTML = html;
        }

        loadAllRecipes();
    </script>
</body>
</html>
