<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>エリシア生産データ一覧</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 5px; color: #000; font-size: 11px; }
        table { width: 100%; border-collapse: collapse; line-height: 1.2; }
        th, td { border: 1px solid #444; padding: 2px 4px; text-align: left; }
        th { background: #d2d2d2; font-weight: bold; position: sticky; top: 0; }
        .row-output { background: #e8f0ff !important; font-weight: bold; }
        .row-material { background: #fff; }
        .qty { color: #d00; text-align: right; width: 30px; }
        .lv { text-align: center; width: 25px; }
        .loc { font-size: 11px; color: #b35900; font-weight: bold; white-space: pre-wrap; }
    </style>
</head>
<body>

    <table>
        <thead>
            <tr>
                <th>職業</th>
                <th>スキル</th>
                <th class="lv">Lv</th>
                <th>レシピ名</th>
                <th>アイテム名（完成品/素材）</th>
                <th class="qty">数量</th>
                <th class="loc">入手場所 (location - target)</th>
            </tr>
        </thead>
        <tbody id="recipe-body">
            <tr><td colspan="7">データ読み込み中...</td></tr>
        </tbody>
    </table>

    <script>
        const S_URL = 'https://djfklvgrpdehqzhhodyg.supabase.co'; 
        const S_KEY = 'sb_publishable_ywFWyEJawcabWW8nHoETtQ_l-JyNOfC';
        const client = supabase.createClient(S_URL, S_KEY);

        async function loadAllRecipes() {
            const tbody = document.getElementById('recipe-body');
            
            // 1. recipesテーブルとitemsテーブルからデータを取得
            const [rRes, iRes] = await Promise.all([
                client.from('recipes').select('*').order('skill_type').order('skill_lv'),
                client.from('items').select('*') // 画像の通り 'items' テーブルを指定
            ]);

            if (rRes.error) {
                tbody.innerHTML = '<tr><td colspan="7">エラー: ' + rRes.error.message + '</td></tr>';
                return;
            }

            const recipes = rRes.data;
            const itemsData = iRes.data || [];

            // 入手場所を検索する関数
            const getLoc = (itemName) => {
                if (!itemName) return '';
                
                // itemsテーブルから、名前が一致し、かつ入手方法が「購入」のものを探す
                const match = itemsData.find(item => 
                    item.name === itemName && item.method === "購入"
                );
                
                // 一致するものがあり、かつ場所とターゲットの情報がある場合のみ表示
                if (match && match.location && match.target) {
                    return `${match.location} - ${match.target}`;
                }
                
                return '-';
            };

            let html = '';
            recipes.forEach(r => {
                // 1. 完成品の行
                html += `
                <tr class="row-output">
                    <td>${r.job_category || ''}</td>
                    <td>${r.skill_type || ''}</td>
                    <td class="lv">${r.skill_lv || ''}</td>
                    <td>${r.recipe_name || ''}</td>
                    <td>【完成】${r.output_item_name || ''}</td>
                    <td class="qty">-</td>
                    <td class="loc">${getLoc(r.output_item_name)}</td>
                </tr>`;

                // 2. 素材1〜4の行
                for (let i = 1; i <= 4; i++) {
                    const mName = r[`material_${i}`];
                    const mQty = r[`amount_${i}`];

                    if (mName && mName !== 'NULL' && mName !== '') {
                        html += `
                        <tr class="row-material">
                            <td colspan="4"></td>
                            <td>└ 素材${i}: ${mName}</td>
                            <td class="qty">${mQty || ''}</td>
                            <td class="loc">${getLoc(mName)}</td>
                        </tr>`;
                    }
                }
            });
            tbody.innerHTML = html;
        }

        loadAllRecipes();
    </script>
</body>
</html>
