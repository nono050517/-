<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>エリシア生産データ一覧</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: "Meiryo", "MS Gothic", sans-serif; margin: 0; padding: 5px; color: #000; font-size: 11px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #444; padding: 2px 4px; text-align: left; vertical-align: top; white-space: nowrap; }
        th { background: #d2d2d2; font-weight: bold; position: sticky; top: 0; z-index: 10; }
        
        .row-header { background: #e0e0e0; font-weight: bold; cursor: pointer; }
        .row-sub { color: #555; }
        .row-output { font-weight: bold; background: #f4f8ff; }
        
        .hidden { display: none; }
        
        /* 縦棒と枝の幅を完全に固定（1ユニット = 18px） */
        .tree-unit { 
            font-family: "MS Gothic", "Courier New", monospace; 
            display: inline-block;
            width: 18px; 
            text-align: center;
            color: #bbb;
            letter-spacing: 0;
        }
        
        /* ボタン専用の固定幅ユニット */
        .btn-unit {
            display: inline-block;
            width: 22px;
            text-align: center;
        }

        .toggle-btn { 
            cursor: pointer; 
            font-weight: bold; 
            color: #666;
            user-select: none;
        }

        .qty-inline { color: #d00; font-weight: bold; margin-right: 8px; }
        .loc-inline { color: #b35900; font-weight: bold; }
        
        .cb { vertical-align: middle; margin: 0 4px 0 2px; cursor: pointer; }
        .recipe-name-text { color: #333; font-weight: bold; cursor: pointer; vertical-align: middle; }
    </style>
</head>
<body>

    <table>
        <thead>
            <tr>
                <th>生産レシピ（開閉：▼開 / ▲閉）</th>
            </tr>
        </thead>
        <tbody id="recipe-body">
            <tr><td>読み込み中...</td></tr>
        </tbody>
    </table>

    <script>
        const S_URL = 'https://djfklvgrpdehqzhhodyg.supabase.co'; 
        const S_KEY = 'sb_publishable_ywFWyEJawcabWW8nHoETtQ_l-JyNOfC';
        const client = supabase.createClient(S_URL, S_KEY);

        function toggleGroup(id) {
            const elements = document.querySelectorAll(`[data-parent="${id}"]`);
            const btn = document.getElementById(`btn-${id}`);
            elements.forEach(el => el.classList.toggle('hidden'));
            if (btn) btn.textContent = btn.textContent === '▼' ? '▲' : '▼';
        }

        async function loadAllRecipes() {
            const tbody = document.getElementById('recipe-body');
            const [rRes, iRes, jRes] = await Promise.all([
                client.from('recipes').select('*').order('required_jobs').order('skill_type').order('skill_lv'),
                client.from('items').select('*'),
                client.from('job_masters').select('*')
            ]);

            const recipes = rRes.data || [];
            const itemsData = iRes.data || [];
            const jobsData = jRes.data || [];

            const getFullJobName = (shortName) => {
                const match = jobsData.find(j => j.short_name === shortName);
                return match ? match.full_name : shortName;
            };

            const getLocText = (itemName) => {
                const match = itemsData.find(item => item.name === itemName && item.method === "購入");
                return match ? `購入：${match.location} - ${match.target}` : '';
            };

            const renderMaterials = (recipe, parentId, parentTrace = []) => {
                let rows = '';
                const materials = [];
                for (let i = 1; i <= 4; i++) {
                    if (recipe[`material_${i}`] && recipe[`material_${i}`] !== 'NULL') {
                        materials.push({ name: recipe[`material_${i}`], qty: recipe[`amount_${i}`] });
                    }
                }

                materials.forEach((m, idx) => {
                    const isLast = (idx === materials.length - 1);
                    
                    let prefixHtml = "";
                    parentTrace.forEach((isParentLast, d) => {
                        if (d === 0) {
                            prefixHtml += `<span class="tree-unit">${isParentLast ? ' ' : '│'}</span>`;
                        } else if (d === 1) {
                            // 完成品＋ボタン幅分の隙間を確保
                            prefixHtml += `<span class="tree-unit">${isParentLast ? ' ' : '│'}</span><span class="btn-unit"></span>`;
                        } else {
                            prefixHtml += `<span class="tree-unit">${isParentLast ? ' ' : '│'}</span>`;
                        }
                    });
                    
                    const mark = isLast ? "┗" : "┣";
                    
                    rows += `
                    <tr class="row-sub" data-parent="${parentId}">
                        <td>
                            ${prefixHtml}<span class="tree-unit">${mark}</span>
                            <span class="btn-unit"></span>
                            <input type="checkbox" class="cb"><span>${m.name}</span>
                            <span class="qty-inline">(×${m.qty || 0})</span>
                            <span class="loc-inline">${getLocText(m.name)}</span>
                        </td>
                    </tr>`;

                    const subR = recipes.find(r => r.output_item_name === m.name);
                    if (subR) rows += renderMaterials(subR, parentId, [...parentTrace, isLast]);
                });
                return rows;
            };

            const grouped = {};
            recipes.forEach(r => {
                const key = `${r.required_jobs}_${r.skill_type}_${r.skill_lv}`;
                if (!grouped[key]) grouped[key] = { job: r.required_jobs, skill: r.skill_type, lv: r.skill_lv, list: [] };
                grouped[key].list.push(r);
            });

            let html = '';
            Object.values(grouped).forEach((group, gIdx) => {
                const fullJob = getFullJobName(group.job);
                const skillId = `group-${gIdx}`;

                html += `
                <tr class="row-header" onclick="toggleGroup('${skillId}')">
                    <td><span class="btn-unit"><span class="toggle-btn" id="btn-${skillId}">▲</span></span> ${fullJob}：${group.skill} (Lv${group.lv})</td>
                </tr>`;

                group.list.forEach((r, rIdx) => {
                    const recipeId = `recipe-${gIdx}-${rIdx}`;
                    const isLastRecipe = (rIdx === group.list.length - 1);
                    const recipeMark = isLastRecipe ? "┗" : "┣";

                    // 1. レシピ名
                    html += `
                    <tr class="row-sub" data-parent="${skillId}">
                        <td>
                            <span class="tree-unit"> </span><span class="tree-unit">${recipeMark}</span><span class="btn-unit"><span class="toggle-btn" id="btn-${recipeId}" onclick="event.stopPropagation(); toggleGroup('${recipeId}')">▲</span></span><span class="recipe-name-text" onclick="event.stopPropagation(); toggleGroup('${recipeId}')">【${r.recipe_name}】</span>
                        </td>
                    </tr>`;
                    
                    // 2. 完成品
                    const outputLine = isLastRecipe ? " " : "│";
                    html += `
                    <tr class="row-output row-sub" data-parent="${skillId}">
                        <td data-parent="${recipeId}">
                            <span class="tree-unit"> </span><span class="tree-unit">${outputLine}</span><span class="btn-unit"></span><span class="tree-unit">┗</span>
                            <span class="btn-unit"></span>
                            <input type="checkbox" class="cb"><span>${r.output_item_name}</span>
                        </td>
                    </tr>`;
                    
                    // 3. 素材
                    html += renderMaterials(r, recipeId, [isLastRecipe, true]);
                });
            });
            tbody.innerHTML = html;
        }
        loadAllRecipes();
    </script>
</body>
</html>
