<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>エリシア生産データ一覧</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: "Meiryo", "Hiragino Kaku Gothic ProN", sans-serif; margin: 0; padding: 5px; color: #000; font-size: 11px; }
        table { width: 100%; border-collapse: collapse; line-height: 1.4; table-layout: fixed; }
        th, td { border: 1px solid #444; padding: 2px 4px; text-align: left; }
        th { background: #d2d2d2; font-weight: bold; position: sticky; top: 0; }
        
        /* ① 親レシピ行の書体統一 */
        .row-recipe { background: #f0f0f0; font-weight: bold; font-size: 12px; }
        .skill-title { font-weight: bold; } /* Lvラベルと書体を統一 */
        
        .row-output { background: #e8f0ff !important; font-weight: bold; }
        .row-sub { color: #555; }
        
        .job-col { width: 60px; }
        .skill-col { width: 140px; }
        .lv-col { width: 30px; }

        .qty-inline { color: #d00; font-weight: bold; margin-right: 8px; }
        .loc-inline { color: #b35900; font-weight: bold; }
        
        /* ② 下層の生産情報の書体統一 */
        .craft-inline { color: #0066cc; font-weight: bold; margin-left: 10px; }
        .craft-lv { color: #0066cc; font-weight: bold; } /* スキル名と同じ色・太さに */
        
        .cb { vertical-align: middle; margin: 0 6px 0 2px; cursor: pointer; }
        
        .tree-line { 
            font-family: "Consolas", "Monaco", "Courier New", monospace; 
            white-space: pre; 
            color: #bbb; 
            display: inline-block;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>

    <table>
        <thead>
            <tr>
                <th class="job-col">職業</th>
                <th class="skill-col">スキル (Lv)</th>
                <th class="lv-col">Lv</th>
                <th>レシピ構成（チェックリスト）</th>
            </tr>
        </thead>
        <tbody id="recipe-body">
            <tr><td colspan="4">読み込み中...</td></tr>
        </tbody>
    </table>

    <script>
        const S_URL = 'https://djfklvgrpdehqzhhodyg.supabase.co'; 
        const S_KEY = 'sb_publishable_ywFWyEJawcabWW8nHoETtQ_l-JyNOfC';
        const client = supabase.createClient(S_URL, S_KEY);

        async function loadAllRecipes() {
            const tbody = document.getElementById('recipe-body');
            const [rRes, iRes] = await Promise.all([
                client.from('recipes').select('*').order('skill_type').order('skill_lv'),
                client.from('items').select('*')
            ]);

            const recipes = rRes.data || [];
            const itemsData = iRes.data || [];

            const getLocText = (itemName) => {
                const match = itemsData.find(item => item.name === itemName && item.method === "購入");
                return match ? `購入：${match.location} - ${match.target}` : '';
            };

            const renderMaterials = (recipe, depth = 0, parentTrace = []) => {
                let rows = '';
                const materials = [];
                for (let i = 1; i <= 4; i++) {
                    if (recipe[`material_${i}`] && recipe[`material_${i}`] !== 'NULL') {
                        materials.push({ name: recipe[`material_${i}`], qty: recipe[`amount_${i}`] });
                    }
                }

                materials.forEach((m, idx) => {
                    const isLast = (idx === materials.length - 1);
                    let prefix = '   '; 
                    parentTrace.forEach(isParentLast => {
                        prefix += isParentLast ? '   ' : '│  ';
                    });
                    const mark = isLast ? '┗' : '┣';
                    
                    const mLoc = getLocText(m.name);
                    const subR = recipes.find(r => r.output_item_name === m.name);
                    
                    let craftInfo = '';
                    if (subR) {
                        // 下層の書体統一
                        craftInfo = `<span class="craft-inline">生産：${subR.required_jobs}：${subR.skill_type}<span class="craft-lv">(Lv${subR.skill_lv})</span>：${subR.recipe_name}</span>`;
                    }

                    rows += `
                    <tr class="row-material ${depth > 0 ? 'row-sub' : ''}">
                        <td colspan="3"></td>
                        <td>
                            <span class="tree-line">${prefix}${mark}</span>
                            <input type="checkbox" class="cb"><span>${m.name}</span>
                            <span class="qty-inline">(×${m.qty || 0})</span>
                            <span class="loc-inline">${mLoc}</span>
                            ${craftInfo}
                        </td>
                    </tr>`;

                    if (subR) {
                        rows += renderMaterials(subR, depth + 1, [...parentTrace, isLast]);
                    }
                });
                return rows;
            };

            let html = '';
            recipes.forEach(r => {
                // 親レシピの書体統一
                const skillWithLv = `<span class="skill-title">${r.skill_type || ''} (Lv${r.skill_lv || ''})</span>`;
                
                html += `
                <tr class="row-recipe">
                    <td>${r.required_jobs || ''}</td>
                    <td>${skillWithLv}</td>
                    <td style="text-align:center;">${r.skill_lv || ''}</td>
                    <td>${r.recipe_name || ''}</td>
                </tr>`;
                
                html += `
                <tr class="row-output">
                    <td colspan="3"></td>
                    <td>
                        <span class="tree-line">┗</span>
                        <input type="checkbox" class="cb"><span>${r.output_item_name || ''}</span>
                        <span class="loc-inline">${getLocText(r.output_item_name)}</span>
                    </td>
                </tr>`;
                
                html += renderMaterials(r, 0, []);
            });
            tbody.innerHTML = html;
        }
        loadAllRecipes();
    </script>
</body>
</html>
