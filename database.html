<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>エリシア生産データ一覧</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; color: #000; font-size: 13px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ccc; padding: 4px 8px; text-align: left; }
        th { background: #f2f2f2; font-weight: normal; }
        tr:nth-child(even) { background: #fafafa; }
        .qty { color: #d00; }
        h1 { font-size: 18px; margin: 0 0 10px 0; border-bottom: 1px solid #000; }
    </style>
</head>
<body>

    <h1>エリシア生産レシピ一覧</h1>
    <div id="table-area">
        <table>
            <thead>
                <tr>
                    <th>完成品</th>
                    <th>レシピ名 / Lv</th>
                    <th>材料1</th>
                    <th>個数</th>
                    <th>材料2</th>
                    <th>個数</th>
                    <th>材料3</th>
                    <th>個数</th>
                    <th>入手場所</th>
                </tr>
            </thead>
            <tbody id="recipe-body">
                <tr><td colspan="9">データ読み込み中...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const S_URL = 'https://djfklvgrpdehqzhhodyg.supabase.co'; 
        const S_KEY = 'sb_publishable_ywFWyEJawcabWW8nHoETtQ_l-JyNOfC';
        const client = supabase.createClient(S_URL, S_KEY);

        async function loadAllRecipes() {
            const tbody = document.getElementById('recipe-body');
            
            // データを全件取得（名称順）
            const { data, error } = await client
                .from('recipes')
                .select('*')
                .order('output_item_name', { ascending: true });
            
            if (error) {
                tbody.innerHTML = '<tr><td colspan="9">エラー: ' + error.message + '</td></tr>';
                return;
            }

            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9">データがありません。</td></tr>';
                return;
            }

            let html = '';
            data.forEach(r => {
                html += `
                <tr>
                    <td>${r.output_item_name || ''}</td>
                    <td>${r.recipe_name || ''} (Lv.${r.skill_lv || ''})</td>
                    <td>${r.material_1 || ''}</td>
                    <td class="qty">${r.material_1_qty || ''}</td>
                    <td>${r.material_2 || ''}</td>
                    <td class="qty">${r.material_2_qty || ''}</td>
                    <td>${r.material_3 || ''}</td>
                    <td class="qty">${r.material_3_qty || ''}</td>
                    <td>${r.location || ''}</td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        loadAllRecipes();
    </script>
</body>
</html>
