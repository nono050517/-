<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>エリシア攻略：精密階層DB</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; background: #fff; color: #202122; }
        
        /* サイドバー */
        .sidebar { width: 260px; background: #f8f9fa; border-right: 1px solid #a2a9b1; padding: 20px; box-sizing: border-box; }
        .sidebar h2 { font-size: 1.1em; border-bottom: 1px solid #a2a9b1; padding-bottom: 5px; margin-top: 0; font-weight: normal; }
        .search-box { width: 100%; padding: 8px; border: 1px solid #a2a9b1; margin-top: 15px; box-sizing: border-box; }

        /* メインエリア */
        .main-content { flex: 1; overflow-y: auto; padding: 30px 50px; }
        h1 { font-family: serif; border-bottom: 1px solid #a2a9b1; font-weight: normal; margin-bottom: 20px; padding-bottom: 5px; }

        /* 階層リスト */
        .tree-container { line-height: 1.6; }
        .tree-node { list-style: none; padding-left: 0; }
        .tree-node ul { 
            list-style: none; 
            padding-left: 30px; /* インデントを確保 */
            border-left: 1px solid #c8ccd1; 
            margin: 2px 0;
        }
        .tree-node li { 
            padding: 4px 10px; 
            border-bottom: 1px solid #f8f9fa;
        }
        .tree-node li:hover { background-color: #f0f7ff; }

        /* パーツ別スタイル */
        .item-name { font-weight: bold; }
        .qty-badge { color: #d33; font-weight: bold; margin: 0 10px; min-width: 40px; display: inline-block; }
        .info-text { color: #54595d; font-size: 0.85em; margin-left: 10px; }
        .loc-tag { color: #0066cc; font-size: 0.85em; background: #f8f9fa; padding: 1px 5px; border: 1px solid #ddd; border-radius: 2px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>案内</h2>
        <input type="text" id="searchInput" class="search-box" placeholder="アイテム名を入力...">
        <p style="font-size: 0.75em; color: #72777d; margin-top: 10px;">Enterキーで検索</p>
    </div>

    <div class="main-content">
        <h1 id="item-title">生産ツリー表示</h1>
        <div id="display-area" class="tree-container">
            <ul id="tree-root" class="tree-node">
                <li>アイテムを検索してください。</li>
            </ul>
        </div>
    </div>

    <script>
        const S_URL = 'https://djfklvgrpdehqzhhodyg.supabase.co'; 
        const S_KEY = 'sb_publishable_ywFWyEJawcabWW8nHoETtQ_l-JyNOfC';
        const client = supabase.createClient(S_URL, S_KEY);

        // 階層を再帰的に取得するメイン関数
        async function buildTree(itemName, currentQty = 1) {
            // そのアイテムが「完成品」として登録されているレシピを探す
            const { data: recipes } = await client.from('recipes').select('*').eq('output_item_name', itemName);
            
            let html = `<li>`;
            
            if (recipes && recipes.length > 0) {
                const r = recipes[0];
                html += `<span class="item-name">■ ${itemName}</span>`;
                html += `<span class="qty-badge">${currentQty} 個</span>`;
                html += `<span class="info-text">(${r.recipe_name || ''} / ${r.skill_type || ''} Lv.${r.skill_lv || ''})</span>`;
                
                // 下層（素材）があるかチェックしてループ
                html += `<ul>`;
                for (let i = 1; i <= 3; i++) {
                    const mName = r[`material_${i}`];
                    // 数量を確実に数値化（空文字やNULLなら1として扱う安全策）
                    let mQtyRaw = r[`material_${i}_qty`];
                    let mQty = (mQtyRaw === null || mQtyRaw === undefined || mQtyRaw === '') ? 0 : Number(mQtyRaw);
                    
                    if (mName && mName !== 'NULL' && mName !== '') {
                        // 子要素へ：子の個数 × 現在の必要数
                        html += await buildTree(mName, mQty * currentQty);
                    }
                }
                html += `</ul>`;
            } else {
                // レシピがない＝末端の素材
                html += `<span class="item-name">・ ${itemName}</span>`;
                html += `<span class="qty-badge">${currentQty} 個</span>`;
                
                // 入手場所などの補足情報（あれば）
                const { data: itemInfo } = await client.from('recipes').select('location').eq('output_item_name', itemName).limit(1);
                const loc = (itemInfo && itemInfo[0] && itemInfo[0].location) ? itemInfo[0].location : "ショップ・採取";
                html += `<span class="loc-tag">入手: ${loc}</span>`;
            }
            
            html += `</li>`;
            return html;
        }

        async function startSearch() {
            const val = document.getElementById('searchInput').value;
            if (!val) return;
            
            const root = document.getElementById('tree-root');
            const title = document.getElementById('item-title');
            root.innerHTML = '<li>構築中...</li>';

            // あいまい検索で対象を特定
            const { data } = await client.from('recipes').select('output_item_name').ilike('output_item_name', `%${val}%`).limit(1);
            
            if (data && data.length > 0) {
                const target = data[0].output_item_name;
                title.innerText = target;
                // ツリー構築開始
                root.innerHTML = await buildTree(target, 1);
            } else {
                root.innerHTML = '<li>アイテムが見つかりませんでした。</li>';
            }
        }

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') startSearch();
        });
    </script>
</body>
</html>
