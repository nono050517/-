<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>エリシア攻略：テキスト階層DB</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; background: #fff; color: #202122; }
        
        /* サイドバー（Wikipedia風） */
        .sidebar { width: 250px; background: #f8f9fa; border-right: 1px solid #a2a9b1; padding: 15px; box-sizing: border-box; }
        .sidebar h2 { font-size: 1.2em; border-bottom: 1px solid #a2a9b1; padding-bottom: 5px; margin-top: 0; }
        .search-box { width: 100%; padding: 5px; border: 1px solid #a2a9b1; margin-top: 10px; }

        /* メインエリア */
        .main-content { flex: 1; overflow-y: auto; padding: 20px 40px; }
        h1 { font-family: serif; border-bottom: 1px solid #a2a9b1; font-weight: normal; margin-bottom: 20px; }

        /* 階層リスト */
        .tree { list-style: none; padding-left: 0; }
        .tree ul { list-style: none; padding-left: 20px; border-left: 1px solid #a2a9b1; }
        .tree li { padding: 4px 8px; position: relative; }
        
        /* ロールオーバー */
        .tree li:hover { background-color: #eaf3ff; }

        .item-label { font-weight: bold; cursor: default; }
        .meta { color: #54595d; font-size: 0.85em; margin-left: 10px; }
        .qty { color: #d33; font-weight: bold; margin-left: 5px; }
        .location { color: #0066cc; margin-left: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>案内</h2>
        <p style="font-size: 0.8em; color: #666;">アイテム名を入力してEnter</p>
        <input type="text" id="searchInput" class="search-box" placeholder="検索...">
    </div>

    <div class="main-content">
        <h1 id="item-title">生産ツリー表示</h1>
        <div id="tree-root" class="tree">
            検索結果がここに表示されます。
        </div>
    </div>

    <script>
        const S_URL = 'https://djfklvgrpdehqzhhodyg.supabase.co'; 
        const S_KEY = 'sb_publishable_ywFWyEJawcabWW8nHoETtQ_l-JyNOfC';
        const client = supabase.createClient(S_URL, S_KEY);

        // 再帰的にツリーを構築する関数
        async function getTreeHtml(itemName, qty = 1) {
            const { data: recipes } = await client.from('recipes').select('*').eq('output_item_name', itemName);
            
            let html = `<li>`;
            
            if (recipes && recipes.length > 0) {
                const r = recipes[0];
                html += `<span class="item-label">■ ${itemName}</span>`;
                if(qty > 1) html += `<span class="qty">×${qty}</span>`;
                html += `<span class="meta">(${r.skill_type} Lv.${r.skill_lv} / ${r.recipe_name})</span>`;
                
                html += `<ul>`;
                for (let i = 1; i <= 3; i++) {
                    const mName = r[`material_${i}`];
                    const mQty = r[`material_${i}_qty`];
                    if (mName && mName !== 'NULL') {
                        html += await getTreeHtml(mName, mQty * qty); // 親の個数を掛けて計算
                    }
                }
                html += `</ul>`;
            } else {
                // 素材（末端）の場合
                html += `<span class="item-label">・ ${itemName}</span>`;
                html += `<span class="qty">×${qty}</span>`;
                // location情報を探す（データがあれば表示）
                const loc = recipes && recipes[0] ? recipes[0].location : "ショップ・採取";
                html += `<span class="location">[入手: ${loc}]</span>`;
            }
            
            html += `</li>`;
            return html;
        }

        async function startSearch() {
            const val = document.getElementById('searchInput').value;
            if (!val) return;
            
            const root = document.getElementById('tree-root');
            const title = document.getElementById('item-title');
            root.innerHTML = '読み込み中...';

            const { data } = await client.from('recipes').select('output_item_name').ilike('output_item_name', `%${val}%`).limit(1);
            
            if (data && data.length > 0) {
                const targetName = data[0].output_item_name;
                title.innerText = targetName;
                root.innerHTML = `<ul class="tree">${await getTreeHtml(targetName, 1)}</ul>`;
            } else {
                root.innerHTML = 'アイテムが見つかりませんでした。';
            }
        }

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') startSearch();
        });
    </script>
</body>
</html>
