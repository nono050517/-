<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>エリシア攻略：精密階層DB</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; margin: 0; display: flex; height: 100vh; background: #fff; color: #202122; }
        
        /* サイドバー */
        .sidebar { width: 260px; background: #f8f9fa; border-right: 1px solid #a2a9b1; padding: 20px; box-sizing: border-box; }
        .sidebar h2 { font-size: 1.2em; border-bottom: 1px solid #a2a9b1; padding-bottom: 5px; margin-top: 0; font-weight: normal; }
        .search-box { width: 100%; padding: 8px; border: 1px solid #a2a9b1; margin-top: 15px; box-sizing: border-box; }

        /* メインエリア */
        .main-content { flex: 1; overflow-y: auto; padding: 30px 50px; }
        h1 { font-family: 'Linux Libertine','Georgia','Times',serif; border-bottom: 1px solid #a2a9b1; font-weight: normal; margin-bottom: 25px; padding-bottom: 5px; }

        /* 階層リストの強化 */
        .tree-root { list-style: none; padding: 0; }
        .tree-root ul { 
            list-style: none; 
            padding-left: 35px; /* インデントを深く */
            border-left: 1px solid #c8ccd1; /* ガイド線を少し強調 */
            margin: 5px 0;
        }
        .tree-root li { 
            padding: 6px 12px; 
            position: relative; 
            border-bottom: 1px solid #f0f0f0; /* 行の区切り */
        }
        
        /* ホバー時の視認性 */
        .tree-root li:hover { background-color: #f0f7ff; }

        .item-label { font-weight: bold; color: #000; }
        .meta { color: #54595d; font-size: 0.85em; margin-left: 15px; font-weight: normal; }
        .qty { color: #d33; font-weight: bold; margin: 0 8px; font-size: 1.1em; }
        .location { color: #0066cc; font-size: 0.85em; background: #f8f9fa; padding: 2px 6px; border-radius: 2px; border: 1px solid #e0e0e0; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>案内</h2>
        <input type="text" id="searchInput" class="search-box" placeholder="アイテム名を入力...">
        <p style="font-size: 0.75em; color: #72777d; margin-top: 10px;">Enterキーで構築を開始します。</p>
    </div>

    <div class="main-content">
        <h1 id="item-title">生産ツリー表示</h1>
        <div id="display-area">
            <ul id="tree-root" class="tree-root">
                <li>検索窓からアイテムを検索してください。</li>
            </ul>
        </div>
    </div>

    <script>
        const S_URL = 'https://djfklvgrpdehqzhhodyg.supabase.co'; 
        const S_KEY = 'sb_publishable_ywFWyEJawcabWW8nHoETtQ_l-JyNOfC';
        const client = supabase.createClient(S_URL, S_KEY);

        async function getTreeHtml(itemName, currentQty = 1) {
            const { data: recipes } = await client.from('recipes').select('*').eq('output_item_name', itemName);
            
            let html = `<li>`;
            
            if (recipes && recipes.length > 0) {
                const r = recipes[0];
                html += `<span class="item-label">■ ${itemName}</span>`;
                html += `<span class="qty">${currentQty} 個</span>`;
                html += `<span class="meta">(レシピ: ${r.recipe_name} / ${r.skill_type} Lv.${r.skill_lv})</span>`;
                
                html += `<ul>`;
                for (let i = 1; i <= 3; i++) {
                    const mName = r[`material_${i}`];
                    // 数量を確実に数値として取得し、親の必要数を掛ける
                    const rawQty = parseInt(r[`material_${i}_qty`]) || 0;
                    
                    if (mName && mName !== 'NULL' && rawQty > 0) {
                        html += await getTreeHtml(mName, rawQty * currentQty);
                    }
                }
                html += `</ul>`;
            } else {
                // 末端素材
                html += `<span class="item-label">・ ${itemName}</span>`;
                html += `<span class="qty">${currentQty} 個</span>`;
                
                // recipesテーブル内にlocationや価格情報があれば表示（無ければデフォルト）
                const loc = (recipes && recipes[0] && recipes[0].location) ? recipes[0].location : "入手方法未登録";
                const price = (recipes && recipes[0] && recipes[0].buy_price) ? ` | 💰${recipes[0].buy_price}` : "";
                
                html += `<span class="location">入手先: ${loc}${price}</span>`;
            }
            
            html += `</li>`;
            return html;
        }

        async function startSearch() {
            const val = document.getElementById('searchInput').value;
            if (!val) return;
            
            const root = document.getElementById('tree-root');
            const title = document.getElementById('item-title');
            root.innerHTML = '<li>ツリーを構築中...</li>';

            const { data } = await client.from('recipes').select('output_item_name').ilike('output_item_name', `%${val}%`).limit(1);
            
            if (data && data.length > 0) {
                const targetName = data[0].output_item_name;
                title.innerText = targetName;
                root.innerHTML = await getTreeHtml(targetName, 1);
            } else {
                root.innerHTML = '<li>該当するデータが見つかりませんでした。</li>';
            }
        }

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') startSearch();
        });
    </script>
</body>
</html>
