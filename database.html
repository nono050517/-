<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>エリシア攻略：レシピ検索</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f4f1ea; padding: 20px; }
        .card { background: white; border-radius: 8px; padding: 18px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-left: 6px solid #2e8b57; }
        .search-box { margin-bottom: 20px; padding: 12px; width: 100%; box-sizing: border-box; font-size: 16px; border: 2px solid #ddd; border-radius: 4px; }
        .recipe-name { color: #8b4513; font-size: 0.85em; font-weight: bold; margin-bottom: 4px; }
        .item-name { color: #2c3e50; font-size: 1.3em; display: block; margin-bottom: 8px; }
        .info-row { margin-bottom: 10px; }
        .tag { display: inline-block; background: #eef5ee; color: #2e8b57; padding: 3px 10px; border-radius: 4px; font-size: 0.85em; margin-right: 5px; border: 1px solid #d0e0d0; }
        
        .detail-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid #eee; }
        .section-title { font-size: 0.9em; font-weight: bold; color: #d35400; margin-bottom: 6px; display: flex; align-items: center; }
        .material-list { list-style: none; padding: 0; margin: 0; }
        .material-item { font-size: 0.95em; color: #444; padding: 4px 0; border-bottom: 1px dashed #f0f0f0; display: flex; justify-content: space-between; }
        .location-box { margin-top: 10px; font-size: 0.9em; color: #555; background: #fdfaf2; padding: 8px; border-radius: 4px; line-height: 1.4; }
    </style>
</head>
<body>

    <h2>📜 エリシア攻略：レシピ検索</h2>
    <input type="text" id="searchInput" class="search-box" placeholder="アイテム名で検索（例：マジカルドロップ）...">
    <div id="display-area">準備中...</div>

    <script>
        const S_URL = 'https://djfklvgrpdehqzhhodyg.supabase.co'; 
        const S_KEY = 'sb_publishable_ywFWyEJawcabWW8nHoETtQ_l-JyNOfC';

        window.onload = function() {
            const client = supabase.createClient(S_URL, S_KEY);
            const input = document.getElementById('searchInput');
            const display = document.getElementById('display-area');

            async function getData() {
                display.innerHTML = '検索中...';
                try {
                    let query = client.from('recipes').select('*');
                    if (input.value) {
                        query = query.ilike('output_item_name', `%${input.value}%`);
                    }
                    
                    const { data, error } = await query;
                    if (error) throw error;

                    display.innerHTML = '';
                    if (!data || data.length === 0) {
                        display.innerHTML = '該当するレシピが見つかりませんでした。';
                        return;
                    }

                    data.forEach(item => {
                        const card = document.createElement('div');
                        card.className = 'card';
                        
                        // 素材リストの組み立て（データがあるものだけ表示）
                        let materialsHtml = '';
                        for(let i=1; i<=3; i++) {
                            const mName = item[`material_${i}`];
                            const mQty = item[`material_${i}_qty`];
                            if(mName && mName !== 'NULL') {
                                materialsHtml += `<li class="material-item"><span>・${mName}</span> <span>${mQty || 1}個</span></li>`;
                            }
                        }

                        card.innerHTML = `
                            <div class="recipe-name">📖 ${item.recipe_name || 'レシピ不明'}</div>
                            <strong class="item-name">✨ ${item.output_item_name || '名称未設定'}</strong>
                            
                            <div class="info-row">
                                <span class="tag">🛡 ${item.skill_type || 'スキル不明'}</span>
                                <span class="tag">Lv.${item.skill_lv || '-'}</span>
                                <span class="tag">👤 ${item.required_jobs || '全職'}</span>
                            </div>

                            <div class="detail-section">
                                <div class="section-title">🛠 必要素材</div>
                                <ul class="material-list">
                                    ${materialsHtml || '<li class="material-item">素材情報なし</li>'}
                                </ul>
                                
                                <div class="location-box">
                                    <strong>📍 入手先 / 備考</strong><br>
                                    ${item.location || 'フィールドドロップ、または店売り'}
                                </div>
                            </div>
                        `;
                        display.appendChild(card);
                    });
                } catch (err) {
                    display.innerHTML = 'エラーが発生しました: ' + err.message;
                }
            }

            input.addEventListener('input', getData);
            getData(); 
        };
    </script>
</body>
</html>
