<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>エリシア生産データ一覧</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 5px; color: #000; font-size: 11px; }
        table { width: 100%; border-collapse: collapse; line-height: 1.4; }
        th, td { border: 1px solid #444; padding: 2px 4px; text-align: left; }
        th { background: #d2d2d2; font-weight: bold; position: sticky; top: 0; }
        
        .row-recipe { background: #f0f0f0; font-weight: bold; font-size: 12px; }
        .row-output { background: #e8f0ff !important; font-weight: bold; }
        .row-sub { color: #555; }
        
        .lv { text-align: center; width: 25px; }
        .qty-inline { color: #d00; font-weight: bold; margin-right: 8px; }
        .loc-inline { color: #b35900; font-weight: bold; }
        .craft-inline { color: #0066cc; font-weight: bold; }
        
        /* チェックボックスとテキストの配置 */
        .cb { vertical-align: middle; margin-right: 4px; cursor: pointer; }
        
        /* ツリー記号のフォントと配置 */
        .tree-line { 
            font-family: "Courier New", Courier, monospace; 
            white-space: pre; 
            color: #ccc; 
            display: inline-block;
        }
    </style>
</head>
<body>

    <table>
        <thead>
            <tr>
                <th>職業</th>
                <th>スキル</th>
                <th class="lv">Lv</th>
                <th>レシピ構成（チェックリスト形式）</th>
            </tr>
        </thead>
        <tbody id="recipe-body">
            <tr><td colspan="4">データ読み込み中...</td></tr>
        </tbody>
    </table>

    <script>
        const S_URL = 'https://djfklvgrpdehqzhhodyg.supabase.co'; 
        const S_KEY = 'sb_publishable_ywFWyEJawcabWW8nHoETtQ_l-JyNOfC';
        const client = supabase.createClient(S_URL, S_KEY);

        async function loadAllRecipes() {
            const tbody = document.getElementById('recipe-body');
            const [rRes, iRes] = await Promise.all([
                client.from('recipes').select('*').order('skill_type').order('skill_lv'),
                client.from('items').select('*')
            ]);

            if (rRes.error) {
                tbody.innerHTML = '<tr><td colspan="4">エラー: ' + rRes.error.message + '</td></tr>';
                return;
            }

            const recipes = rRes.data;
            const itemsData = iRes.data || [];

            const getLocText = (itemName) => {
                const match = itemsData.find(item => item.name === itemName && item.method === "購入");
                return match ? `購入：${match.location} - ${match.target}` : '';
            };

            // 素材を再帰的に掘り下げる関数
            const renderMaterials = (recipe, depth = 0, parentTrace = []) => {
                let rows = '';
                const materials = [];
                for (let i = 1; i <= 4; i++) {
                    if (recipe[`material_${i}`] && recipe[`material_${i}`] !== 'NULL') {
                        materials.push({ name: recipe[`material_${i}`], qty: recipe[`amount_${i}`], num: i });
                    }
                }

                materials.forEach((m, idx) => {
                    const isLast = (idx === materials.length - 1);
                    
                    // インデント記号の生成
                    let prefix = '';
                    parentTrace.forEach(isParentLast => {
                        prefix += isParentLast ? '　 ' : '│  ';
                    });
                    const mark = isLast ? '┗' : '┣';
                    
                    const mLoc = getLocText(m.name);
                    const subR = recipes.find(r => r.output_item_name === m.name);

                    rows += `
                    <tr class="row-material ${depth > 0 ? 'row-sub' : ''}">
                        <td colspan="3"></td>
                        <td>
                            <span class="tree-line">${prefix}${mark}</span>
                            <input type="checkbox" class="cb"><label>素材${m.num}：${m.name}</label>
                            <span class="qty-inline">(×${m.qty || 0})</span>
                            <span class="loc-inline">${mLoc}</span>
                        </td>
                    </tr>`;

                    if (subR) {
                        const newTrace = [...parentTrace, isLast];
                        let subPrefix = '';
                        newTrace.forEach(isL => {
                            subPrefix += isL ? '　 ' : '│  ';
                        });

                        rows += `
                        <tr class="row-sub">
                            <td colspan="3"></td>
                            <td>
                                <span class="tree-line">${subPrefix}┗</span>
                                <span class="craft-inline">生産：${subR.required_jobs}：${subR.skill_type}：${subR.recipe_name}</span>
                            </td>
                        </tr>`;
                        // 深掘り（次の階層へ）
                        rows += renderMaterials(subR, depth + 1, newTrace);
                    }
                });
                return rows;
            };

            let html = '';
            recipes.forEach(r => {
                // レシピ親行
                html += `<tr class="row-recipe"><td>${r.required_jobs || ''}</td><td>${r.skill_type || ''}</td><td class="lv">${r.skill_lv || ''}</td><td>${r.recipe_name || ''}</td></tr>`;
                
                // 完成品行
                html += `
                <tr class="row-output">
                    <td colspan="3"></td>
                    <td>
                        <span class="tree-line">┗</span>
                        <input type="checkbox" class="cb"><label>【完成】${r.output_item_name || ''}</label>
                        <span class="loc-inline">${getLocText(r.output_item_name)}</span>
                    </td>
                </tr>`;
                
                // 素材の展開
                html += renderMaterials(r, 0, []);
            });
            tbody.innerHTML = html;
        }
        loadAllRecipes();
    </script>
</body>
</html>
