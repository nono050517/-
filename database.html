<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>エリシア攻略：階層型データベース</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --sidebar-width: 300px; --accent: #2e8b57; }
        body { font-family: "Helvetica Neue", Arial, sans-serif; margin: 0; display: flex; height: 100vh; background: #fdfaf2; color: #333; }
        
        /* サイドバー */
        .sidebar { width: var(--sidebar-width); background: #2c3e50; color: white; padding: 20px; display: flex; flex-direction: column; box-shadow: 2px 0 10px rgba(0,0,0,0.2); }
        .sidebar h2 { font-size: 1.1em; border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 20px; }
        .nav-group { margin-bottom: 20px; }
        .nav-btn { width: 100%; background: #34495e; border: none; color: #bdc3c7; padding: 12px; text-align: left; cursor: pointer; margin-bottom: 5px; border-radius: 4px; }
        .nav-btn.active { background: var(--accent); color: white; }
        .search-box { width: 100%; padding: 10px; border-radius: 4px; border: none; font-size: 14px; }

        /* メインエリア */
        .main-content { flex: 1; overflow-y: auto; padding: 40px; }
        .tree-container { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

        /* 階層デザイン */
        .node { margin-left: 25px; border-left: 2px dashed #ccc; padding-left: 20px; position: relative; margin-top: 10px; }
        .node::before { content: ""; position: absolute; top: 15px; left: 0; width: 15px; height: 2px; background: #ccc; }
        
        .item-row { display: flex; align-items: center; padding: 8px 12px; background: #f8f9fa; border-radius: 6px; margin-bottom: 5px; border: 1px solid #eee; }
        .item-main { flex: 1; font-weight: bold; color: #2c3e50; }
        .meta-info { font-size: 0.85em; color: #666; margin-left: 15px; display: flex; gap: 15px; }
        
        .badge-price { color: #d35400; font-weight: bold; }
        .badge-loc { color: var(--accent); background: #eef5ee; padding: 2px 6px; border-radius: 3px; }
        .badge-skill { color: #2980b9; background: #ebf5fb; padding: 2px 6px; border-radius: 3px; }
        
        .root-node { margin-left: 0; border-left: none; }
        .root-node > .item-row { background: #eef5ee; border: 1px solid var(--accent); font-size: 1.1em; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>🛠 エリシア階層 DB</h2>
        <div class="nav-group">
            <button class="nav-btn active" id="btn-recipes">レシピから探す</button>
        </div>
        <input type="text" id="searchInput" class="search-box" placeholder="完成品の名前を入力...">
    </div>

    <div class="main-content">
        <div id="display-area" class="tree-container">
            検索結果がここに表示されます。
        </div>
    </div>

    <script>
        const S_URL = 'https://djfklvgrpdehqzhhodyg.supabase.co'; 
        const S_KEY = 'sb_publishable_ywFWyEJawcabWW8nHoETtQ_l-JyNOfC';
        const client = supabase.createClient(S_URL, S_KEY);

        async function buildTree(itemName, isRoot = false) {
            // recipesテーブルから、そのアイテムが作れるレシピを探す
            const { data: recipes } = await client.from('recipes').select('*').eq('output_item_name', itemName);
            
            let html = `<div class="node ${isRoot ? 'root-node' : ''}">`;
            
            if (recipes && recipes.length > 0) {
                const r = recipes[0];
                html += `
                    <div class="item-row">
                        <span class="item-main">✨ ${itemName}</span>
                        <div class="meta-info">
                            <span class="badge-skill">🛠 ${r.skill_type} Lv.${r.skill_lv}</span>
                            <span class="badge-loc">📖 ${r.recipe_name}</span>
                        </div>
                    </div>
                `;
                // 素材を再帰的に展開
                for (let i = 1; i <= 3; i++) {
                    const mName = r[`material_${i}`];
                    const mQty = r[`material_${i}_qty`];
                    if (mName && mName !== 'NULL') {
                        html += await buildLeaf(mName, mQty);
                    }
                }
            } else {
                // レシピがない＝末端の素材。ショップ情報を探す
                const { data: items } = await client.from('recipes').select('location, buy_price').eq('output_item_name', itemName); 
                // 本来はitemsテーブルから取るべきですが、一旦既存のrecipes内のlocation等を参照
                
                html += `
                    <div class="item-row">
                        <span class="item-main">📦 ${itemName}</span>
                        <div class="meta-info">
                            <span class="badge-loc">📍 ${ (recipes && recipes[0]?.location) || '商人 / 採取' }</span>
                            <span class="badge-price">💰 ${ (recipes && recipes[0]?.buy_price) || '-' }</span>
                        </div>
                    </div>
                `;
            }
            
            html += `</div>`;
            return html;
        }

        async function buildLeaf(name, qty) {
            // 素材も「レシピ」があるかチェック
            const { data: subRecipe } = await client.from('recipes').select('*').eq('output_item_name', name).single();
            
            let leafHtml = `<div class="node">`;
            if (subRecipe) {
                // 生産品の場合
                leafHtml += `
                    <div class="item-row">
                        <span class="item-main">🔨 ${name} (${qty}個)</span>
                        <div class="meta-info">
                            <span class="badge-skill">生産: ${subRecipe.skill_type}</span>
                        </div>
                    </div>
                `;
                // さらに下の階層へ（今回は3階層程度を想定）
                for (let i = 1; i <= 3; i++) {
                    const m = subRecipe[`material_${i}`];
                    if (m && m !== 'NULL') {
                        leafHtml += `<div class="node"><div class="item-row"><span class="item-main">・${m}</span></div></div>`;
                    }
                }
            } else {
                // 購入品などの場合
                leafHtml += `
                    <div class="item-row">
                        <span class="item-main">🌿 ${name} (${qty}個)</span>
                        <div class="meta-info">
                            <span class="badge-loc">📍 商人販売</span>
                        </div>
                    </div>
                `;
            }
            leafHtml += `</div>`;
            return leafHtml;
        }

        async function search() {
            const val = document.getElementById('searchInput').value;
            if (!val) return;
            const area = document.getElementById('display-area');
            area.innerHTML = '構築中...';

            // 入力された名前に一致する完成品を検索
            const { data } = await client.from('recipes').select('output_item_name').ilike('output_item_name', `%${val}%`).limit(5);
            
            if (data && data.length > 0) {
                area.innerHTML = '';
                for (const item of data) {
                    area.innerHTML += await buildTree(item.output_item_name, true);
                }
            } else {
                area.innerHTML = '該当なし';
            }
        }

        document.getElementById('searchInput').addEventListener('change', search);
    </script>
</body>
</html>
