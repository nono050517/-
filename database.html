<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>エリシア攻略データベース</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f4f1ea; padding: 20px; }
        .card { background: white; border-radius: 8px; padding: 15px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 5px solid #8b4513; }
        .search-box { margin-bottom: 20px; padding: 10px; width: 100%; box-sizing: border-box; font-size: 16px; }
        strong { color: #2c3e50; font-size: 1.2em; }
    </style>
</head>
<body>

    <h2>📦 エリシア攻略データベース</h2>
    <!-- ここから oninput を削除しました -->
    <input type="text" id="searchInput" class="search-box" placeholder="アイテム名で検索...">
    <div id="display-area">準備中...</div>

    <script>
        // 設定エリア（ここを自分の情報に！）
        const S_URL = 'https://djfklvgrpdehqzhhodyg.supabase.co'; 
        const S_KEY = 'sb_publishable_ywFWyEJawcabWW8nHoETtQ_l-JyNOfC';

        // 全てを読み込んでから実行する「安全装置」
        window.onload = function() {
            const client = supabase.createClient(S_URL, S_KEY);
            const input = document.getElementById('searchInput');
            const display = document.getElementById('display-area');

            async function getData() {
                display.innerHTML = '読み込み中...';
                try {
                    let query = client.from('items').select('*');
                    if (input.value) {
                        query = query.ilike('name', `%${input.value}%`);
                    }
                    const { data, error } = await query;
                    if (error) throw error;

                    display.innerHTML = '';
                    if (!data || data.length === 0) {
                        display.innerHTML = '見つかりませんでした。';
                        return;
                    }

                    data.forEach(item => {
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <strong>${item.name || '無名'}</strong><br>
                            📍 ${item.location || '不明'}<br>
                            🛒 買: ${item.buy_price || '-'} / 🪙 売: ${item.sell_price || '-'}
                        `;
                        display.appendChild(card);
                    });
                } catch (err) {
                    display.innerHTML = 'エラー: ' + err.message;
                }
            }

            // 入力されたら検索を実行する
            input.addEventListener('input', getData);
            // 最初にデータを表示する
            getData();
        };
    </script>
</body>
</html>
