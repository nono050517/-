<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>エリシア生産データ一覧</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; color: #000; font-size: 12px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #666; padding: 2px 5px; text-align: left; }
        th { background: #e1e1e1; font-weight: normal; position: sticky; top: 0; }
        tr:nth-child(even) { background: #f5f5f5; }
        /* 数字列を少し目立たせる */
        .qty { color: #d00; text-align: right; font-weight: bold; width: 25px; }
        .lv { text-align: center; width: 30px; }
    </style>
</head>
<body>

    <table>
        <thead>
            <tr>
                <th>職業</th>
                <th>スキル</th>
                <th class="lv">Lv</th>
                <th>レシピ名</th>
                <th>完成品</th>
                <th>素材1</th><th class="qty">個</th>
                <th>素材2</th><th class="qty">個</th>
                <th>素材3</th><th class="qty">個</th>
                <th>素材4</th><th class="qty">個</th>
                <th>入手場所</th>
            </tr>
        </thead>
        <tbody id="recipe-body">
            <tr><td colspan="13">読み込み中...</td></tr>
        </tbody>
    </table>

    <script>
        const S_URL = 'https://djfklvgrpdehqzhhodyg.supabase.co'; 
        const S_KEY = 'sb_publishable_ywFWyEJawcabWW8nHoETtQ_l-JyNOfC';
        const client = supabase.createClient(S_URL, S_KEY);

        async function loadAllRecipes() {
            const tbody = document.getElementById('recipe-body');
            
            // 全件取得し、スキル名とレベル順に並べる
            const { data, error } = await client
                .from('recipes')
                .select('*')
                .order('skill_type', { ascending: true })
                .order('skill_lv', { ascending: true });
            
            if (error) {
                tbody.innerHTML = '<tr><td colspan="13">エラーが発生しました</td></tr>';
                return;
            }

            let html = '';
            data.forEach(r => {
                // 各カラム名が実際のDBと一致しているか確認が必要ですが、
                // 一般的な命名規則(material_1_qtyなど)に基づいて出力します。
                html += `
                <tr>
                    <td>${r.job_category || ''}</td>
                    <td>${r.skill_type || ''}</td>
                    <td class="lv">${r.skill_lv || ''}</td>
                    <td>${r.recipe_name || ''}</td>
                    <td>${r.output_item_name || ''}</td>
                    <td>${r.material_1 || ''}</td>
                    <td class="qty">${r.amountl_1_qty ?? ''}</td>
                    <td>${r.material_2 || ''}</td>
                    <td class="qty">${r.amountl_2_qty ?? ''}</td>
                    <td>${r.material_3 || ''}</td>
                    <td class="qty">${r.amountl_3_qty ?? ''}</td>
                    <td>${r.material_4 || ''}</td>
                    <td class="qty">${r.amount_4_qty ?? ''}</td>
                    <td>${r.location || ''}</td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        loadAllRecipes();
    </script>
</body>
</html>
