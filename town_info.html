<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>テスト画面 - エリシア・アーカイブス</title>
    <style>
        /* 画面を左メニュー(200px)と右メインに分けるシンプルなスタイル */
        .map-container {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            margin-top: 50px;
        }
        .map-sidebar {
            width: 200px;
            min-width: 200px;
            background-color: #f9f9f9;
            border-right: 2px dashed #ccc;
            padding: 15px;
        }
        .map-main-data {
            flex-grow: 1;
            font-size: 5em; /* 「あ」をめちゃくちゃ大きく表示します */
            color: red;
            font-weight: bold;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <main class="main-content">
            <div class="map-container">
                
                <div class="map-sidebar">
                    <h3 style="margin-top: 0;">■ テストメニュー</h3>
                    <p style="font-size: 0.9em; color: #666;">※common.jsを外してテスト中</p>
                </div>

                <div class="map-main-data">
                    あ
                </div>

            </div>
        </main>
    </div>

    </body>
</html>
