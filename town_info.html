<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>マップ詳細 - エリシア・アーカイブス</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* マップ詳細ページ内を「左に街リスト」「右に情報」の2カラムにするスタイル */
        .map-container {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }
        .map-sidebar {
            width: 200px;
            min-width: 200px;
            background-color: #fff;
            border-right: 2px dashed #ccc;
            padding-right: 15px;
        }
        .map-main-data {
            flex-grow: 1;
            /* テストの文字が見やすいように少し装飾 */
            font-size: 3em;
            color: red;
            font-weight: bold;
            padding: 20px;
        }
        .town-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .town-list li {
            margin-bottom: 8px;
        }
        .town-list a {
            text-decoration: none;
            color: #1e90ff;
            font-size: 0.95em;
        }
        .town-list a:hover {
            text-decoration: underline;
        }
        .town-list a.active {
            font-weight: bold;
            color: #d02090;
        }
    </style>
</head>
<body>
    <header class="page-header"></header>

    <div class="wrapper">
        <nav id="sidebar-nav"></nav>
        
        <main class="main-content">
            <div class="map-container">
                
                <div class="map-sidebar">
                    <h3 style="font-size: 1em; margin-top: 0; border-bottom: 2px solid #ccc; padding-bottom: 5px; color: black;">■ 街一覧</h3>
                    <ul id="inner-town-list" class="town-list">
                        <li>読み込み中...</li>
                    </ul>
                </div>

                <div class="map-main-data" id="map-main-content">
                    あ
                </div>

            </div>
        </main>
    </div>

    <script src="common.js"></script>

    <script>
        // ご自身のSupabaseのURLとAnon Keyに書き換えてください
        const SUPABASE_URL = "https://your-supabase-url.supabase.co";
        const SUPABASE_ANON_KEY = "your-anon-key";
        
        const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function getMapIdParam() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id') || '1';
        }

        // 左メニューの街一覧を生成する処理（ここが動けばSupabaseとの通信は100%成功しています）
        async function loadInnerTownList(currentId) {
            try {
                const { data: towns, error } = await supabase
                    .from('map_field')
                    .select('field_id, map_name, map_type')
                    .eq('map_type', 'town')
                    .order('field_id', { ascending: true });

                if (error) {
                    console.error("Supabaseエラー:", error);
                    return;
                }

                const listContainer = document.getElementById('inner-town-list');
                if (!listContainer) return;
                listContainer.innerHTML = '';

                towns.forEach(town => {
                    const li = document.createElement('li');
                    const a = document.createElement('a');
                    a.href = `map_info.html?id=${town.field_id}`;
                    a.innerText = `・${town.map_name}`;
                    
                    if (String(town.field_id) === String(currentId)) {
                        a.classList.add('active');
                    }

                    a.addEventListener('click', function(e) {
                        e.preventDefault();
                        const newUrl = `map_info.html?id=${town.field_id}`;
                        history.pushState(null, null, newUrl);
                        loadMapDetails();
                    });

                    li.appendChild(a);
                    listContainer.appendChild(li);
                });
            } catch (e) {
                console.error("JavaScriptエラー:", e);
            }
        }

        // メイン処理（右側は何も読み込まず、ただ「あ」という文字を書き換えないまま維持します）
        async function loadMapDetails() {
            const fieldId = getMapIdParam();
            
            // 左側のリスト読み込みだけを実行
            loadInnerTownList(fieldId);
            
            // ⭕ 右側はSupabaseからのテーブルハメ込み処理をすべてカットし、
            // 「あ」がそのまま表示され続けるか、あるいは通信確認用の文字を出すだけにしています。
            console.log("現在のマップIDパラメータ:", fieldId);
        }

        document.addEventListener("DOMContentLoaded", loadMapDetails);
    </script>
</body>
</html>
