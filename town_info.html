<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マップ詳細 - エリシア・アーカイブス</title>
    <link rel="stylesheet" href="style.css">
    <meta name="description" id="meta-description" content="">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* 隣接マップ移動用の3x3グリッドスタイル */
        .grid-3x3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 400px;
            margin: 20px 0;
        }
        .grid-cell {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 50px;
        }
        .map-btn {
            width: 100%;
            padding: 12px;
            background-color: #f0f4f8;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            text-align: center;
            text-decoration: none;
            color: #1e293b;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .map-btn:hover {
            background-color: #3b82f6;
            color: white;
            border-color: #2563eb;
        }
        /* NPC一覧用のテーブルスタイル */
        .npc-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        .npc-table th, .npc-table td {
            border: 1px solid #cbd5e1;
            padding: 10px;
            text-align: left;
        }
        .npc-table th {
            background-color: #f1f5f9;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <header class="header">
            <h1 class="site-title">エリシア・アーカイブス</h1>
        </header>

        <div class="container">
            <nav class="sidebar" id="sidebar-menu">
                </nav>

            <main class="main-content">
                <div class="item-content">
                    <h2 class="page-title" id="map-title">読み込み中...</h2>
                    <p class="section-category" id="map-type-label">-</p>

                    <h3>🌐 隣接マップ移動</h3>
                    <div class="grid-3x3" id="navigation-grid">
                        </div>

                    <h3>👥 配置NPC一覧</h3>
                    <div id="npc-list-container">
                        <p>NPC情報を読み込み中...</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        // 1. Supabaseの初期化設定（ご自身のURLとAnon Keyを入れてください）
        const SUPABASE_URL = 'https://djfklvgrpdehqzhhodyg.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_ywFWyEJawcabWW8nHoETtQ_l-JyNOfC';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 方角カラムと画面表示用ラベルのマッピング定義
        const DIRECTION_LABELS = {
            northwest: "北西 ↖", north: "北 ↑", northeast: "北東 ↗",
            west: "西 ←",       center: "中央 ☉", east: "東 →",
            southwest: "南西 ↙", south: "南 ↓", southeast: "南東 ↘"
        };

        // 3x3グリッドを左上から右下へ配置する順番の定義
        const GRID_ORDER = [
            'northwest', 'north', 'northeast',
            'west',      'center', 'east',
            'southwest', 'south', 'southeast'
        ];

        // URLパラメータから現在の「field_id（マップID）」を取得する関数
        function getMapIdParam() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id') || '1'; // パラメータがなければ初期街のID「1」を出す
        }

        // マップ詳細と配置NPCを同時に取得して画面を描くメイン関数
        async function loadMapDetail() {
            const currentMapId = getMapIdParam();
            
            try {
                // --- 作戦1：マップ基本情報と隣接ルートの取得 ---
                // インポートしたマップテーブル名（map_field）からデータを1行検索
                const { data: mapData, error: mapError } = await supabase
                    .from('map_field')
                    .select('*')
                    .eq('field_id', currentMapId)
                    .single();

                if (mapError) throw mapError;

                if (mapData) {
                    // マップ名と種別の描画
                    document.getElementById('map-title').innerText = mapData.map_name;
                    document.getElementById('map-type-label').innerText = `マップ種別: ${mapData.map_type.toUpperCase()}`;

                    // SEO対策：検索エンジン向けの説明文（description）を自動書き換え
                    const descriptionText = `エリシアオンラインの攻略データベース「エリシア・アーカイブス」の${mapData.map_name}詳細ページです。隣接マップの繋がりや、配置されているNPCの一覧データを掲載しています。`;
                    document.getElementById('meta-description').setAttribute('content', descriptionText);
                    document.title = `${mapData.map_name} - エリシア・アーカイブス`;

                    // 3x3隣接移動ボタンの自動生成処理
                    const gridContainer = document.getElementById('navigation-grid');
                    gridContainer.innerHTML = ''; // 読み込み中の表示をクリア

                    GRID_ORDER.forEach(dir => {
                        const cell = document.createElement('div');
                        cell.className = 'grid-cell';

                        // カラムの値（隣接マップのID）があるかチェック
                        if (mapData[dir] && mapData[dir] !== 'NULL') {
                            const nextMapId = mapData[dir];
                            const btn = document.createElement('a');
                            btn.className = 'map-btn';
                            // クリックすると次のマップIDをパラメータにセットして同じページをリロード
                            btn.href = `town_info.html?id=${nextMapId}`;
                            btn.innerText = DIRECTION_LABELS[dir];
                            cell.appendChild(btn);
                        } else {
                            // 隣接がないマスは、中央の目印（☉）だけ薄く表示しておく
                            if (dir === 'center') {
                                cell.innerHTML = `<span style="color: #94a3b8;">${DIRECTION_LABELS.center}</span>`;
                            }
                        }
                        gridContainer.appendChild(cell);
                    });
                }

                // --- 作戦2：そのマップに立っているNPC一覧の取得 ---
                // インポートしたNPCテーブル名（npc）から、field_id が一致するNPCを全件取得
                const { data: npcList, error: npcError } = await supabase
                    .from('npc')
                    .select('*')
                    .eq('field_id', currentMapId)
                    .order('npc_id', { ascending: true }); // npc_id 順に綺麗に並べる

                if (npcError) throw npcError;

                const npcContainer = document.getElementById('npc-list-container');
                
                if (!npcList || npcList.length === 0) {
                    // NPCが一人もいないマップの場合（フィールドなど）
                    npcContainer.innerHTML = '<p style="color: #64748b;">このマップに配置されているNPCはいません。</p>';
                } else {
                    // NPCがいる場合、綺麗なテーブル（表）形式にして画面に出す
                    let tableHtml = `
                        <table class="npc-table">
                            <thead>
                                <tr>
                                    <th style="width: 80px;">NPC ID</th>
                                    <th>NPC名</th>
                                </tr>
                            </thead>
                            <tbody>
                    `;

                    npcList.forEach(npc => {
                        tableHtml += `
                            <tr>
                                <td>${npc.npc_id}</td>
                                <td><strong>${npc.npc_name}</strong></td>
                            </tr>
                        `;
                    });

                    tableHtml += `
                            </tbody>
                        </table>
                    `;
                    npcContainer.innerHTML = tableHtml;
                }

            } catch (err) {
                console.error('エラーが発生しました:', err);
                document.getElementById('map-title').innerText = 'データ取得失敗';
                document.getElementById('npc-list-container').innerHTML = `
                    <p style="color: #ef4444; font-weight: bold;">
                        Supabaseからのデータ読み込みでエラーが起きました。テーブル名やカラム名がプログラムと合っているか確認してください。
                    </p>
                `;
            }
        }

        // 画面の読み込みが完了したらメイン処理を実行
        document.addEventListener('DOMContentLoaded', loadMapDetail);
    </script>

    </body>
</html>
