<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>エリア詳細 - エリシア・アーカイブス</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <nav id="sidebar-nav"></nav>
            
            <main>
                <div style="display: flex; gap: 20px; align-items: flex-start;">
                    
                    <aside style="width: 200px; flex-shrink: 0;">
                        <h3 style="font-size: 1.1em; border-bottom: 2px solid #ccc; padding-bottom: 5px; margin-top: 0;">街一覧</h3>
                        <ul id="town-list-sidebar" style="list-style: none; padding: 0; margin: 10px 0;">
                            <li>読み込み中...</li>
                        </ul>
                    </aside>

                    <div id="map-detail-main" style="flex-grow: 1;">
                        <h2 class="page-title" id="map-main-title">エリア情報を読み込んでいます...</h2>
                        
                        <div id="debug-error-zone" style="color: red; font-weight: bold; margin-bottom: 15px; display: none;"></div>

                        <div class="item-content" id="map-type-badge" style="color: #777; margin-bottom: 20px;"></div>

                        <h3 class="section-category">🗺️ 隣接マップ</h3>
                        <div class="item-content" id="map-grid-container" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 450px;"></div>
                        
                        <h3 class="section-category">👥 配置NPC</h3>
                        <div class="item-content" id="npc-list-container"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        // Supabase接続設定（ご自身のものに書き換えてください）
        const supabaseUrl = 'YOUR_SUPABASE_URL';
        const supabaseKey = 'YOUR_SUPABASE_KEY';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        async function loadMapDetailData() {
            const urlParams = new URLSearchParams(window.location.search);
            const mapId = urlParams.get('id') || '1';

            // 1. 街一覧を左側に取得
            const townListElement = document.getElementById('town-list-sidebar');
            const { data: towns } = await supabaseClient
                .from('map_field')
                .select('field_id, map_name')
                .eq('map_type', 'town');

            if (towns) {
                townListElement.innerHTML = towns.map(t => 
                    `<li><a href="town_info.html?id=${t.field_id}">${t.map_name}</a></li>`
                ).join('');
            }

            // 2. 選択されたマップの詳細を右側に取得
            const { data: mapData, error } = await supabaseClient
                .from('map_field')
                .select('*')
                .eq('field_id', mapId)
                .single();

            if (error) {
                document.getElementById('debug-error-zone').style.display = 'block';
                document.getElementById('debug-error-zone').innerText = 'データ取得エラー: ' + error.message;
                return;
            }

            document.getElementById('map-main-title').innerText = mapData.map_name;
            // 他のマップ詳細表示処理（グリッドボタン作成など）をここに記述
        }

        window.addEventListener('DOMContentLoaded', loadMapDetailData);
    </script>
</body>
</html>
