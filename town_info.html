<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="">
    <title>街情報 - エリシア・アーカイブス</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="common.js" defer></script>
</head>
<body>
    <header>
        <div class="header-inner">
            <h1 class="site-title"><a href="index.html">エリシア・アーカイブス</a></h1>
        </div>
    </header>

    <div class="wrapper">
        <div class="container">
            <aside class="sidebar" id="sidebar">
            </aside>

            <main class="content">
                <h1 class="page-title" id="map-page-title">マップ情報読み込み中...</h1>
                
                <div class="wiki-wrapper" style="display: flex; gap: 20px; align-items: flex-start; margin-top: 20px;">
                    
                    <aside class="town-list-sidebar" style="width: 200px; flex-shrink: 0; background: #f9f9f9; padding: 15px; border: 1px solid #ddd; border-radius: 4px;">
                        <h3 style="font-size: 1.1em; margin-top: 0; border-bottom: 2px solid #333; padding-bottom: 5px;">街一覧</h3>
                        <ul id="town-list" style="list-style-type: none; padding-left: 0; margin: 0; font-size: 0.9em; line-height: 1.8;">
                            <li>読み込み中...</li>
                        </ul>
                    </aside>

                    <div class="map-detail-main" style="flex-grow: 1;">
                        
                        <div id="map-basic-info" style="margin-bottom: 15px;"></div>

                        <h2 class="section-category">隣接マップ移動</h2>
                        <div class="map-grid-container" id="map-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 450px; margin: 15px 0;">
                            </div>

                        <div id="map-detail-content">
                            </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        // !!注意：ご自身のSupabaseのURLとキーに書き換えてください!!
        const SUPABASE_URL = 'あなたのSupabaseのURL';
        const SUPABASE_KEY = 'あなたのSupabaseのAnonキー';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function getMapIdParam() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id') || '1'; 
        }

        const currentMapId = getMapIdParam();

        // 8方向の定義マッピング
        const DIRECTION_LABELS = {
            northwest: "北西 ↖", north: "北 ↑", northeast: "北東 ↗",
            west: "西 ←",      center: "中央 ☉", east: "東 →",
            southwest: "南西 ↙", south: "南 ↓", southeast: "南東 ↘"
        };
        
        const GRID_ORDER = [
            'northwest', 'north', 'northeast',
            'west', 'center', 'east',
            'southwest', 'south', 'southeast'
        ];

        document.addEventListener('DOMContentLoaded', async () => {
            await renderTownList();
            await loadMapDetail();
        });

        // 1. 左側に「街一覧」を並べる処理
        async function renderTownList() {
            const { data, error } = await supabase
                .from('map_field') 
                .select('field_id, map_name, map_type')
                .eq('map_type', 'town')
                .order('field_id', { ascending: true });

            if (error) {
                console.error("街一覧取得エラー:", error);
                document.getElementById('town-list').innerHTML = '<li style="color:red;">一覧の取得に失敗しました</li>';
                return;
            }

            const listContainer = document.getElementById('town-list');
            listContainer.innerHTML = ''; 

            if (data && data.length > 0) {
                data.forEach(town => {
                    const li = document.createElement('li');
                    if (town.field_id == currentMapId) {
                        li.innerHTML = `<span style="font-weight: bold; color: #d02090; border-left: 3px solid #d02090; padding-left: 5px;">${town.map_name}</span>`;
                    } else {
                        li.innerHTML = `<a href="town_info.html?id=${town.field_id}" style="text-decoration: none; color: #0066cc;">${town.map_name}</a>`;
                    }
                    listContainer.appendChild(li);
                });
            } else {
                listContainer.innerHTML = '<li>データがありません</li>';
            }
        }

        // 2. 右側に「街の詳細」と「3x3移動ボタン」を出す処理
        async function loadMapDetail() {
            const { data: mapData, error: mapError } = await supabase
                .from('map_field') 
                .select('*')
                .eq('field_id', currentMapId)
                .single();

            if (mapError || !mapData) {
                console.error("マップ詳細取得エラー:", mapError);
                document.getElementById('map-page-title').textContent = "データが見つかりません";
                return;
            }

            // タイトルとSEOタグ自動書き換え
            document.title = `${mapData.map_name} - エリシア・アーカイブス`;
            document.getElementById('map-page-title').textContent = mapData.map_name;
            
            const metaDescription = document.querySelector('meta[name="description"]');
            if (metaDescription) {
                metaDescription.setAttribute('content', `エリシアオンラインのマップ「${mapData.map_name}」の詳細情報ページです。`);
            }

            // 種別情報の描画
            document.getElementById('map-basic-info').innerHTML = `
                <span style="background: #eee; color: #333; padding: 4px 10px; font-size: 0.85em; border: 1px solid #ccc; border-radius: 4px;">種別：${mapData.map_type}</span>
            `;

            // 3x3移動グリッドの自動組み立て（データを維持して綺麗にボタン化します！）
            const gridContainer = document.getElementById('map-grid');
            gridContainer.innerHTML = '';

            GRID_ORDER.forEach(dir => {
                const btn = document.createElement('div');
                
                if (dir === 'center') {
                    // 真ん中は現在地
                    btn.className = 'map-grid-btn center-map';
                    btn.style = 'background: #fff0f5; border: 1px solid #ffb6c1; color: #d02090; padding: 10px; text-align: center; font-size: 0.85em; font-weight: bold; border-radius: 4px;';
                    btn.innerHTML = `<div style="font-size:0.75em; color:#666;">現在地</div>${mapData.map_name}`;
                } else {
                    // 周りの8方向の判定
                    const destId = mapData[dir]; // テーブルのカラム（northなど）の数字を取得
                    
                    if (destId && destId !== 'NULL') {
                        // 隣にマップがある場合（クリックで移動可能）
                        btn.className = 'map-grid-btn';
                        btn.style = 'background: #f9f9f9; border: 1px solid #ccc; padding: 10px; text-align: center; font-size: 0.85em; font-weight: bold; border-radius: 4px; cursor: pointer;';
                        btn.innerHTML = `<a href="town_info.html?id=${destId}" style="text-decoration: none; color: #0066cc;"><div style="font-size:0.75em; color:#666;">${DIRECTION_LABELS[dir]}</div>ID: ${destId}へ</a>`;
                    } else {
                        // 隣にマップがない場合（グレーアウト）
                        btn.className = 'map-grid-btn empty';
                        btn.style = 'background: #eee; border: 1px solid #ddd; color: #aaa; padding: 10px; text-align: center; font-size: 0.85em; border-radius: 4px;';
                        btn.innerHTML = `<div style="font-size:0.75em; color:#999;">${DIRECTION_LABELS[dir]}</div>-`;
                    }
                }
                gridContainer.appendChild(btn);
            });

            // その他のテキスト内容
            document.getElementById('map-detail-content').innerHTML = `
                <p style="margin-top:20px; color:#555;">※NPC一覧や施設データは、ここにSupabaseから自動で追加されるようになります。</p>
            `;
        }
    </script>
</body>
</html>
