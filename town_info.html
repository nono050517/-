<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="description" id="meta-description" content="街一覧ページです。">
    <title>街一覧 - エリシア・アーカイブス</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <nav id="sidebar-nav"></nav>
            
            <main>
                <div class="item-content">
                    <h1>エリシアの街一覧</h1>
                    <hr>
                    <ul id="town-list" style="font-size: 1.2rem; line-height: 2;">
                        <li>読み込み中...</li>
                    </ul>
                </div>
            </main>
        </div>
    </div>
    
    <script src="common.js"></script>
    <script>
        // Supabaseの設定
        const supabaseUrl = 'YOUR_SUPABASE_URL';
        const supabaseKey = 'YOUR_SUPABASE_ANON_KEY';
        const supabase = supabaseClient.createClient(supabaseUrl, supabaseKey);

        async function loadTowns() {
            const townListElement = document.getElementById('town-list');

            // 1. maps テーブルから、カテゴリが '街' または 'town' のデータを取得
            // ※もしお使いのテーブルのカラム名が 'is_town' (boolean) などの場合は、
            //  .eq('is_town', true) など、環境に合わせて調整してください。
            const { data, error } = await supabase
                .from('maps')
                .select('map_name') // ひとまず名前だけ取得
                .eq('category', '街'); // カラム名「category」の値が「街」のもの

            // エラーハンドリング
            if (error) {
                console.error("データ取得エラー:", error);
                townListElement.innerHTML = `<li style="color:red;">データの読み込みに失敗しました</li>`;
                return;
            }

            // 2. 画面への表示処理
            if (data && data.length > 0) {
                townListElement.innerHTML = ''; // 「読み込み中...」を消去
                
                data.forEach(town => {
                    const li = document.createElement('li');
                    li.textContent = town.map_name;
                    townListElement.appendChild(li);
                });
            } else {
                townListElement.innerHTML = '<li>街のデータが見つかりませんでした。</li>';
            }
        }

        // ページ読み込み時に実行
        window.addEventListener('DOMContentLoaded', loadTowns);
    </script>
</body>
</html>
