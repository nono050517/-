<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>🧪 接続テスト - エリシア・アーカイブス</title>
</head>
<body>

    <div style="padding: 30px; font-family: sans-serif;">
        <h1 style="color: #d02090;">エリシアDB 接続テスト</h1>
        <hr>
        
        <h2 id="test-title" style="color: #333; margin-top: 20px;">データを読み込み中...</h2>

        <div id="error-box" style="margin-top: 20px; padding: 15px; background: #fff0f0; border-left: 5px solid red; color: red; font-weight: bold; display: none; white-space: pre-wrap;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // プロジェクト情報
        const SUPABASE_URL = "https://gqfbtbthbyasvscfeypt.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_ywFWyEJawcabWW8nHoETtQ_l-JyNOfC";
        
        const titleEl = document.getElementById('test-title');
        const errorBox = document.getElementById('error-box');

        // Supabaseが読み込めているかチェック
        if (typeof supabase === 'undefined') {
            errorBox.style.display = 'block';
            errorBox.innerText = "❌ 初期化エラー:\nSupabaseのライブラリが読み込めませんでした。（URL間違ってるかも）";
            titleEl.innerText = "初期化に失敗しました";
        } else {
            // クライアントの作成
            const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            async function fetchOnlyMapName() {
                try {
                    // id=1（王宮前広場）のデータを1件だけ直接狙い撃ち
                    const { data, error } = await supabaseClient
                        .from('map_field')
                        .select('map_name')
                        .eq('field_id', 1)
                        .limit(1);

                    if (error) {
                        errorBox.style.display = 'block';
                        errorBox.innerHTML = `❌ Supabaseからエラーが返ってきました：\n【コード】: ${error.code}\n【メッセージ】: ${error.message}`;
                        titleEl.innerText = "データ取得エラー";
                    } else if (data && data.length > 0) {
                        titleEl.innerText = `🎉 取得成功！ 街の名前は… 【 ${data[0].map_name} 】です！`;
                    } else {
                        titleEl.innerText = `⚠️ 接続はできましたが、ID: 1 のデータが見つかりません。`;
                    }
                } catch (err) {
                    errorBox.style.display = 'block';
                    errorBox.innerText = "❌ プログラム実行エラー:\n" + err.message;
                    titleEl.innerText = "システム障害が発生しました";
                }
            }

            // 実行！
            fetchOnlyMapName();
        }
    </script>
</body>
</html>
