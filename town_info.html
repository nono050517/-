<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>🧪 接続テスト - エリシア・アーカイブス</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>

    <div style="padding: 30px; font-family: sans-serif;">
        <h1 style="color: #d02090;">エリシアDB 接続テスト</h1>
        <hr>
        
        <h2 id="test-title" style="color: #333; margin-top: 20px;">データを読み込み中...</h2>
        <div id="error-box" style="margin-top: 20px; padding: 15px; background: #fff0f0; border-left: 5px solid red; color: red; font-weight: bold; display: none; white-space: pre-wrap;"></div>
    </div>

    <script>
        // ★スクショで確認した「本物の大正解キー」に戻します！
        const SUPABASE_URL = "https://gqfbtbthbyasvscfeypt.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdxZmJ0YnRoYnlhc3ZzY2ZleXB0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTgzODU1MDksImV4cCI6MjAzMzk2MTUwOX0.w9R7YpAnm6W5vTcoFhS7eU9R_N9y6p7579VvR7VvR7M";
        
        let supabaseClient;
        const titleEl = document.getElementById('test-title');
        const errorBox = document.getElementById('error-box');

        try {
            // ライブラリの初期化
            if (window.supabase && window.supabase.createClient) {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            } else if (typeof supabase !== 'undefined' && supabase.createClient) {
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            } else {
                throw new Error("Supabaseライブラリをブラウザが認識できていません。");
            }
        } catch(e) {
            errorBox.style.display = 'block';
            errorBox.innerText = "❌ 初期化エラー:\n" + e.message;
            titleEl.innerText = "初期化に失敗しました";
        }

        async function fetchOnlyMapName() {
            if (!supabaseClient) return;

            // URLから id=数字 を読み取る（なければ 1 にする）
            const urlParams = new URLSearchParams(window.location.search);
            const currentId = urlParams.get('id') || '1';
            const numericId = parseInt(currentId, 10) || 1;

            try {
                // map_fieldテーブルから、map_nameだけを1件取得
                const { data, error } = await supabaseClient
                    .from('map_field')
                    .select('map_name')
                    .eq('field_id', numericId)
                    .limit(1);

                if (error) {
                    errorBox.style.display = 'block';
                    errorBox.innerHTML = `❌ Supabaseからエラーが返ってきました：\n【コード】: ${error.code}\n【メッセージ】: ${error.message}`;
                    titleEl.innerText = "データ取得エラー";
                } else if (data && data.length > 0) {
                    // ✨大勝利のメッセージ
                    titleEl.innerText = `🎉 取得成功！ 街の名前は… 【 ${data[0].map_name} 】です！`;
                } else {
                    titleEl.innerText = `⚠️ 接続はできましたが、ID: ${numericId} のデータがテーブル内に見つかりません。`;
                }
            } catch (err) {
                errorBox.style.display = 'block';
                errorBox.innerText = "❌ プログラム実行エラー:\n" + err.message;
                titleEl.innerText = "システム障害が発生しました";
            }
        }

        window.addEventListener('DOMContentLoaded', fetchOnlyMapName);
    </script>
</body>
</html>
