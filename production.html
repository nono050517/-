<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>エリシア生産データ一覧（Pink Ver.）</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 文字色を黒に統一 */
        body { font-family: "Meiryo", sans-serif; margin: 0; padding: 5px; color: #000; font-size: 11px; background-color: #fff0f5; }
        table { width: 100%; border-collapse: collapse; line-height: 1.4; background-color: #fff; }
        
        /* 見出しの文字も黒に */
        th { border: 1px solid #ffb6c1; padding: 4px 6px; text-align: left; vertical-align: top; background: #ffc0cb; color: #000; font-weight: bold; position: sticky; top: 0; z-index: 10; }
        td { border: 1px solid #ffdae0; padding: 2px 4px; text-align: left; vertical-align: top; color: #000; }
        
        /* 職業行：文字は白の方が見やすいので維持（もし黒がよければ #000 に変えます！） */
        .row-job { background: #ffb6c1; color: #fff; font-weight: bold; font-size: 13px; cursor: pointer; height: 26px; }
        
        /* スキル・レシピ・素材：すべて黒文字 */
        .row-skill { background: #fff0f5; color: #000; font-weight: bold; font-size: 12px; cursor: pointer; }
        .row-recipe { color: #000; font-weight: bold; cursor: pointer; }
        .row-output { font-weight: bold; background: #fffafb; color: #000; }
        .row-sub { color: #000; }
        
        tr.hidden { display: none; }
        
        .method-label {
            display: inline-block;
            font-size: 9px;
            padding: 0px 4px;
            margin-left: 4px;
            border-radius: 3px;
            cursor: pointer;
            user-select: none;
            border: 1px solid #ccc;
            background: #fff;
            vertical-align: middle;
            line-height: 1.2;
        }
        .label-buy { color: #ff8c00; border-color: #ff8c00; }
        .label-drop { color: #2e8b57; border-color: #2e8b57; }
        .label-craft { color: #0066cc; border-color: #0066cc; }

        .source-container {
            font-size: 10px;
            background: #fffafa;
            border: 1px solid #ffb6c1;
            padding: 4px 8px;
            margin: 3px 0 5px 120px;
            border-radius: 6px;
            box-shadow: 2px 2px 5px rgba(255, 182, 193, 0.3);
            width: fit-content;
            color: #000;
        }
        .source-item { margin-bottom: 2px; border-bottom: 1px dotted #ffdae0; }
        .source-item:last-child { border-bottom: none; }
        .craft-detail { color: #0066cc; font-weight: bold; }

        /* 数量（×1など）も黒にして、太字で強調 */
        .qty-inline { color: #000; font-weight: bold; margin-right: 2px; }
        .cb { vertical-align: middle; margin: 0 6px 0 2px; cursor: pointer; accent-color: #e91e63; }
        
        .tree-line { font-family: "MS Gothic", monospace; white-space: pre; color: #ffc0cb; display: inline-block; letter-spacing: 0; font-size: 12px; }
        .toggle-icon { display: inline-block; width: 15px; text-align: center; margin-right: 5px; color: #d02090; }
    </style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th>🌸 生産レシピ・チェックリスト 🌸</th>
            </tr>
        </thead>
        <tbody id="recipe-body">
            <tr><td>データ読み込み中...</td></tr>
        </tbody>
    </table>

    <script>
        const S_URL = 'https://djfklvgrpdehqzhhodyg.supabase.co'; 
        const S_KEY = 'sb_publishable_ywFWyEJawcabWW8nHoETtQ_l-JyNOfC';
        const client = supabase.createClient(S_URL, S_KEY);

        async function init() { await loadAllRecipes(); }

        function toggleLayer(id, btnId) {
            const btn = document.getElementById(btnId);
            const isExpanding = btn.textContent === '▶';
            const elements = document.querySelectorAll(`tr[data-parent]`);
            elements.forEach(el => {
                const parents = el.getAttribute('data-parent').split(' ');
                const immediateParent = parents[parents.length - 1];
                if (immediateParent === id) {
                    if (isExpanding) { el.classList.remove('hidden'); } 
                    else { recursiveHide(el.getAttribute('data-id')); el.classList.add('hidden'); }
                }
            });
            btn.textContent = isExpanding ? '▼' : '▶';
        }

        function recursiveHide(parentId) {
            if (!parentId) return;
            const children = document.querySelectorAll(`tr[data-parent*="${parentId}"]`);
            children.forEach(child => {
                child.classList.add('hidden');
                const childBtn = document.getElementById(`btn-${child.getAttribute('data-id')}`);
                if (childBtn) childBtn.textContent = '▶';
                recursiveHide(child.getAttribute('data-id'));
            });
        }

        function toggleDetail(detailId) {
            const el = document.getElementById(detailId);
            if (el) { el.style.display = (el.style.display === 'none' || el.style.display === '') ? 'block' : 'none'; }
        }

        async function loadAllRecipes() {
            const tbody = document.getElementById('recipe-body');
            try {
                const [rRes, iRes, jRes] = await Promise.all([
                    client.from('recipes').select('*').order('skill_type').order('skill_lv'),
                    client.from('items').select('*'),
                    client.from('job_masters').select('*')
                ]);
                if (rRes.error) throw rRes.error;
                const recipes = rRes.data || [];
                const itemsData = iRes.data || [];
                const jobsData = jRes.data || [];

                const getFullJobName = (shortName) => {
                    const match = jobsData.find(j => j.short_name === shortName);
                    return match ? match.full_name : shortName;
                };

                const getMethodElements = (itemName, pId, idx, currentRecipeName) => {
                    const matches = itemsData.filter(item => item.name === itemName);
                    const craftR = recipes.find(r => r.output_item_name === itemName);
                    let labels = '';
                    let details = '';
                    const safeRecipeName = currentRecipeName ? currentRecipeName.replace(/[\s-【】]/g, '_') : 'none';
                    const baseId = `src-${safeRecipeName}-${pId.replace(/[\s-]/g, '_')}-${idx}`;

                    const buySites = matches.filter(m => m.method === '購入');
                    if (buySites.length > 0) {
                        const id = `${baseId}-buy`;
                        labels += `<span class="method-label label-buy" onclick="event.stopPropagation(); toggleDetail('${id}')">購入</span>`;
                        details += `<div id="${id}" class="source-container" style="display:none;">`;
                        buySites.forEach(m => { details += `<div class="source-item">●購入：${m.location} (${m.target})</div>`; });
                        details += `</div>`;
                    }
                    const dropSites = matches.filter(m => m.method === 'ドロップ');
                    if (dropSites.length > 0) {
                        const id = `${baseId}-drop`;
                        labels += `<span class="method-label label-drop" onclick="event.stopPropagation(); toggleDetail('${id}')">ドロップ</span>`;
                        details += `<div id="${id}" class="source-container" style="display:none;">`;
                        dropSites.forEach(m => { details += `<div class="source-item">◆ドロップ：${m.location} (${m.target})</div>`; });
                        details += `</div>`;
                    }
                    if (craftR) {
                        const id = `${baseId}-craft`;
                        const fullJob = getFullJobName(craftR.required_jobs);
                        labels += `<span class="method-label label-craft" onclick="event.stopPropagation(); toggleDetail('${id}')">生産</span>`;
                        details += `<div id="${id}" class="source-container" style="display:none;"><div class="craft-detail">生産：${fullJob}：${craftR.skill_type}(Lv${craftR.skill_lv})</div></div>`;
                    }
                    return { labels, details };
                };

                const renderMaterials = (recipe, pId, parentTrace = []) => {
                    let rows = '';
                    const materials = [];
                    for (let i = 1; i <= 4; i++) {
                        if (recipe[`material_${i}`] && recipe[`material_${i}`] !== 'NULL') {
                            materials.push({ name: recipe[`material_${i}`], qty: recipe[`amount_${i}`] });
                        }
                    }
                    materials.forEach((m, idx) => {
                        const isLast = (idx === materials.length - 1);
                        let prefix = '';
                        parentTrace.forEach(isParentLast => { prefix += isParentLast ? '   ' : '│  '; });
                        const mark = isLast ? '┗' : '┣';
                        const { labels, details } = getMethodElements(m.name, pId, idx, recipe.recipe_name);
                        rows += `<tr class="row-sub hidden" data-parent="${pId}"><td><span class="tree-line">${prefix}${mark}</span><input type="checkbox" class="cb"><span>${m.name}</span><span class="qty-inline">(×${m.qty || 0})</span>${labels}${details}</td></tr>`;
                        const subR = recipes.find(r => r.output_item_name === m.name);
                        if (subR) rows += renderMaterials(subR, pId, [...parentTrace, isLast]);
                    });
                    return rows;
                };

                let html = '';
                jobsData.forEach((job, jIdx) => {
                    const jobRecipes = recipes.filter(r => r.required_jobs === job.short_name);
                    if (jobRecipes.length === 0) return;
                    const jobId = `job-${jIdx}`;
                    html += `<tr class="row-job" data-id="${jobId}" onclick="toggleLayer('${jobId}', 'btn-${jobId}')"><td><span class="toggle-icon" id="btn-${jobId}" style="color:#fff">▶</span>${job.full_name}</td></tr>`;
                    const skillGroup = {};
                    jobRecipes.forEach(r => {
                        const sKey = `${r.skill_type}_${r.skill_lv}`;
                        if (!skillGroup[sKey]) skillGroup[sKey] = [];
                        skillGroup[sKey].push(r);
                    });
                    Object.keys(skillGroup).forEach((skillKey, sIdx) => {
                        const skillId = `${jobId}-skill-${sIdx}`;
                        const [sType, sLv] = skillKey.split('_');
                        const filteredRecipes = [];
                        const seen = new Set();
                        skillGroup[skillKey].forEach(r => { if (!seen.has(r.recipe_name)) { seen.add(r.recipe_name); filteredRecipes.push(r); } });
                        html += `<tr class="row-skill hidden" data-id="${skillId}" data-parent="${jobId}" onclick="toggleLayer('${skillId}', 'btn-${skillId}')"><td><span class="tree-line">┗ </span><span class="toggle-icon" id="btn-${skillId}">▶</span>${sType} (Lv${sLv})</td></tr>`;
                        filteredRecipes.forEach((r, rIdx) => {
                            const recipeId = `${skillId}-rec-${rIdx}`;
                            const isLastRec = (rIdx === filteredRecipes.length - 1);
                            const rMark = isLastRec ? '┗' : '┣';
                            html += `<tr class="row-recipe row-sub hidden" data-id="${recipeId}" data-parent="${skillId}" onclick="toggleLayer('${recipeId}', 'btn-${recipeId}')"><td><span class="tree-line">   ${rMark} </span><span class="toggle-icon" id="btn-${recipeId}">▶</span>【${r.recipe_name}】</td></tr>`;
                            const outPre = isLastRec ? '      ' : '   │  ';
                            const outMethods = getMethodElements(r.output_item_name, recipeId, 99, r.recipe_name);
                            html += `<tr class="row-output row-sub hidden" data-parent="${recipeId}"><td><span class="tree-line">${outPre}┗ </span><input type="checkbox" class="cb"><span>${r.output_item_name}</span>${outMethods.labels}${outMethods.details}</td></tr>`;
                            html += renderMaterials(r, recipeId, [isLastRec, true, true]);
                        });
                    });
                });
                tbody.innerHTML = html;
            } catch (err) { tbody.innerHTML = `<tr><td>エラー: ${err.message}</td></tr>`; }
        }
        init();
    </script>
</body>
</html>
